<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Pit Boss · STRATUM</title>
<meta name="theme-color" content="#c8833a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pit Boss">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@300;400;500;600;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg0: #0e0f0c; --bg1: #141510; --bg2: #1c1d18; --bg3: #252620;
    --border: #2e3028; --borderHot: #8a7a3a;
    --copper: #c8833a; --copperLight: #e8a855; --copperDim: #6b4820;
    --ochre: #d4a843;
    --text0: #f0ede6; --text1: #b8b4a8; --text2: #6e6b60; --text3: #3e3d36;
    --red: #c0402a; --green: #4a8a52; --blue: #3a6a9a;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg0); color: var(--text0);
    font-family: 'Barlow', sans-serif;
    font-size: 14px; line-height: 1.4; min-height: 100vh;
  }
  .mono { font-family: 'DM Mono', monospace; font-feature-settings: 'tnum'; }
  .label { font-family: 'Barlow Condensed', sans-serif; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 500; color: var(--text1); font-size: 11px; }
  /* HEADER */
  header {
    background: var(--bg1); border-bottom: 1px solid var(--border);
    padding: 14px 24px; display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 10;
  }
  .brand { display: flex; align-items: center; gap: 16px; }
  .brand-strip { width: 3px; height: 32px; background: linear-gradient(to bottom, var(--copper), var(--copperDim)); }
  .brand-title { font-family: 'Barlow Condensed', sans-serif; text-transform: uppercase; letter-spacing: 0.12em; font-weight: 600; font-size: 16px; color: var(--text0); }
  .brand-sub { font-family: 'Barlow Condensed', sans-serif; text-transform: uppercase; letter-spacing: 0.10em; color: var(--text2); font-size: 11px; margin-left: 8px; }
  .header-actions { display: flex; gap: 8px; align-items: center; }
  button {
    background: var(--bg2); color: var(--text0);
    border: 1px solid var(--border); padding: 6px 14px;
    font-family: 'Barlow Condensed', sans-serif; text-transform: uppercase; letter-spacing: 0.08em;
    font-size: 11px; font-weight: 500; cursor: pointer;
    border-radius: 3px; transition: all 0.15s;
  }
  button:hover { border-color: var(--borderHot); color: var(--copperLight); }
  button.primary { background: var(--copperDim); border-color: var(--copper); color: var(--text0); }
  button.primary:hover { background: var(--copper); color: var(--bg0); }
  input[type="text"], input[type="number"], input[type="date"], select {
    background: var(--bg3); border: 1px solid var(--border); color: var(--text0);
    font-family: 'DM Mono', monospace; font-size: 13px; padding: 5px 10px;
    border-radius: 3px; outline: none;
  }
  input[type="file"] { display: none; }
  .file-label {
    background: var(--bg2); border: 1px solid var(--border); padding: 6px 14px;
    font-family: 'Barlow Condensed', sans-serif; text-transform: uppercase; letter-spacing: 0.08em;
    font-size: 11px; font-weight: 500; cursor: pointer; border-radius: 3px;
  }
  .file-label:hover { border-color: var(--borderHot); color: var(--copperLight); }
  /* LAYOUT */
  .container { padding: 24px; max-width: 1600px; margin: 0 auto; }
  .empty-state {
    text-align: center; padding: 60px 20px;
    background: var(--bg1); border: 1px dashed var(--border); border-radius: 4px;
  }
  .empty-state h2 { font-family: 'Barlow Condensed', sans-serif; text-transform: uppercase; letter-spacing: 0.10em; color: var(--text1); font-weight: 600; font-size: 18px; margin-bottom: 12px; }
  .empty-state p { color: var(--text2); margin-bottom: 16px; max-width: 540px; margin-left: auto; margin-right: auto; font-size: 13px; }
  /* OVERVIEW STRIP */
  .overview { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 10px; margin-bottom: 24px; }
  .ov-tile { background: var(--bg2); border: 1px solid var(--border); border-left: 3px solid var(--copper); padding: 14px 16px; border-radius: 0 4px 4px 0; }
  .ov-label { font-family: 'Barlow Condensed', sans-serif; text-transform: uppercase; letter-spacing: 0.08em; font-size: 10px; color: var(--text2); margin-bottom: 4px; }
  .ov-value { font-family: 'DM Mono', monospace; font-size: 22px; color: var(--copperLight); font-weight: 500; line-height: 1.0; }
  .ov-detail { font-family: 'Barlow', sans-serif; color: var(--text1); font-size: 11px; margin-top: 4px; }
  /* SECTION */
  .section { background: var(--bg1); border: 1px solid var(--border); border-left: 3px solid var(--copper); border-radius: 0 4px 4px 0; padding: 16px 20px; margin-bottom: 16px; }
  .section-title { font-family: 'Barlow Condensed', sans-serif; text-transform: uppercase; letter-spacing: 0.10em; font-weight: 600; font-size: 14px; color: var(--text0); margin-bottom: 12px; display: flex; justify-content: space-between; align-items: baseline; }
  .section-sub { font-family: 'Barlow', sans-serif; color: var(--text2); font-size: 11px; font-weight: 400; }
  /* OPERATIONS TABLE */
  .ops-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .ops-table th { text-align: left; font-family: 'Barlow Condensed', sans-serif; text-transform: uppercase; letter-spacing: 0.08em; font-size: 10px; color: var(--text2); font-weight: 500; padding: 8px; border-bottom: 1px solid var(--border); }
  .ops-table td { padding: 10px 8px; border-bottom: 1px solid var(--border); font-family: 'DM Mono', monospace; color: var(--text0); vertical-align: top; }
  .ops-table td.label-cell { font-family: 'Barlow', sans-serif; color: var(--text0); }
  .ops-table td.cost { color: var(--copperLight); }
  .ops-table tr:last-child td { border-bottom: none; }
  .ops-table tr:hover { background: var(--bg2); }
  .bottleneck-chip { display: inline-block; padding: 3px 8px; border-radius: 3px; font-family: 'Barlow Condensed', sans-serif; text-transform: uppercase; letter-spacing: 0.08em; font-size: 10px; font-weight: 600; }
  .b-balanced { background: rgba(74, 138, 82, 0.18); color: var(--green); border: 1px solid var(--green); }
  .b-dig { background: rgba(212, 168, 67, 0.15); color: var(--ochre); border: 1px solid var(--ochre); }
  .b-truck { background: rgba(192, 64, 42, 0.15); color: var(--red); border: 1px solid var(--red); }
  .b-dump { background: rgba(212, 168, 67, 0.15); color: var(--ochre); border: 1px solid var(--ochre); }
  .match-bar { width: 80px; height: 6px; background: var(--bg3); border: 1px solid var(--border); position: relative; border-radius: 2px; display: inline-block; vertical-align: middle; margin-left: 6px; }
  .match-fill { height: 100%; background: var(--copper); }
  .match-fill.ok { background: var(--green); }
  .match-fill.warn { background: var(--ochre); }
  .match-fill.alert { background: var(--red); }
  /* BOTTLENECK DISTRIBUTION BAR */
  .dist-bar { display: flex; width: 100%; height: 32px; border: 1px solid var(--border); background: var(--bg3); overflow: hidden; border-radius: 3px; }
  .dist-seg { height: 100%; display: flex; align-items: center; justify-content: center; font-family: 'DM Mono', monospace; font-size: 11px; color: var(--bg0); font-weight: 600; }
  .dist-balanced { background: var(--green); }
  .dist-dig { background: var(--ochre); }
  .dist-truck { background: var(--red); }
  .dist-dump { background: var(--copper); }
  .dist-legend { display: flex; gap: 16px; margin-top: 10px; font-size: 11px; }
  .dist-legend .item { display: flex; align-items: center; gap: 6px; font-family: 'Barlow', sans-serif; color: var(--text1); }
  .dist-legend .swatch { width: 10px; height: 10px; display: inline-block; }
  /* FLEET ALLOCATION */
  .fleet-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 8px; }
  .fleet-cell { background: var(--bg2); border: 1px solid var(--border); border-left: 2px solid var(--copperDim); padding: 8px 12px; border-radius: 0 3px 3px 0; }
  .fleet-cell .fc-label { font-family: 'Barlow Condensed', sans-serif; text-transform: uppercase; letter-spacing: 0.06em; font-size: 10px; color: var(--text2); }
  .fleet-cell .fc-value { font-family: 'DM Mono', monospace; font-size: 16px; color: var(--text0); }
  .fleet-cell .fc-detail { font-family: 'Barlow', sans-serif; color: var(--text2); font-size: 10px; }
  /* v1.9.3 — RAR drill-down */
  .rar-drill:hover rect:nth-of-type(2) { filter: brightness(1.25) drop-shadow(0 0 3px var(--copperLight)); }
  .rar-drill:hover { opacity: 1; }
  svg:has(.rar-drill:hover) .rar-drill:not(:hover) { opacity: 0.4; }
  .rar-drill.selected rect:nth-of-type(2) { stroke: var(--copperLight); stroke-width: 2; filter: drop-shadow(0 0 4px var(--copperLight)); }

  /* HELP REPORT */
  .help-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 900px) { .help-grid { grid-template-columns: 1fr; } }
  .help-card { background: var(--bg2); border: 1px solid var(--border); padding: 14px 18px; border-radius: 0 4px 4px 0; }
  .help-card.h { border-left: 3px solid var(--green); }
  .help-card.l { border-left: 3px solid var(--red); }
  .help-card.e { border-left: 3px solid var(--ochre); }
  .help-card.p { border-left: 3px solid var(--copper); }
  .help-card.help { border-left: 3px solid var(--blue); }
  .help-card-title { font-family: 'Barlow Condensed', sans-serif; text-transform: uppercase; letter-spacing: 0.10em; font-weight: 600; font-size: 13px; margin-bottom: 10px; display: flex; align-items: baseline; justify-content: space-between; }
  .help-card.h .help-card-title { color: var(--green); }
  .help-card.l .help-card-title { color: var(--red); }
  .help-card.e .help-card-title { color: var(--ochre); }
  .help-card.p .help-card-title { color: var(--copper); }
  .help-card.help .help-card-title { color: var(--blue); }
  .help-card-sub { font-family: 'Barlow', sans-serif; color: var(--text2); font-size: 11px; font-weight: 400; }
  .help-list { list-style: none; padding: 0; margin: 0; font-family: 'Barlow', sans-serif; font-size: 13px; color: var(--text0); }
  .help-list li { padding: 6px 0 6px 18px; position: relative; border-bottom: 1px dashed var(--border); line-height: 1.45; }
  .help-list li:last-child { border-bottom: none; }
  .help-list li::before { content: "▸"; position: absolute; left: 0; color: var(--copperDim); }
  .help-card.h .help-list li::before { color: var(--green); }
  .help-card.l .help-list li::before { color: var(--red); }
  .help-card.e .help-list li::before { color: var(--ochre); }
  .help-card.p .help-list li::before { color: var(--copper); }
  .help-card.help .help-list li::before { color: var(--blue); }
  .help-list li strong { color: var(--text0); }
  .help-empty { font-family: 'Barlow', sans-serif; color: var(--text2); font-size: 12px; padding: 6px 0; font-style: italic; }
  /* TAB STRIP */
  .view-tabs { display: flex; gap: 0; margin-bottom: 18px; border-bottom: 1px solid var(--border); }
  .view-tab { padding: 9px 18px; font-family: 'Barlow Condensed', sans-serif; text-transform: uppercase; letter-spacing: 0.10em; font-size: 12px; font-weight: 600; color: var(--text2); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; }
  .view-tab:hover { color: var(--text1); }
  .view-tab.active { color: var(--copperLight); border-bottom-color: var(--copper); }
  /* OPPORTUNITY ALERT */
  .alert-box { background: var(--bg2); border: 1px solid var(--ochre); border-left: 3px solid var(--ochre); padding: 12px 16px; margin-bottom: 12px; border-radius: 0 4px 4px 0; font-size: 13px; }
  .alert-box .alert-title { font-family: 'Barlow Condensed', sans-serif; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; color: var(--ochre); font-size: 11px; margin-bottom: 4px; }
  .alert-box .alert-text { color: var(--text0); }
  /* TOAST */
  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--bg2); border: 1px solid var(--copper); border-left: 3px solid var(--copper); padding: 12px 18px; font-family: 'Barlow Condensed', sans-serif; text-transform: uppercase; letter-spacing: 0.06em; font-size: 12px; color: var(--text0); border-radius: 0 4px 4px 0; opacity: 0; transform: translateY(10px); transition: all 0.2s; pointer-events: none; z-index: 100; }
  .toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-strip"></div>
    <div>
      <span class="brand-title">Pit Boss</span>
    </div>
  </div>
  <div class="header-actions">
    <label class="file-label" for="csv-input">Load Sessions CSV</label>
    <input type="file" id="csv-input" accept=".csv"/>
    <label class="file-label" for="tracker-input" title="Load tracker CSV with actuals">Load Tracker</label>
    <input type="file" id="tracker-input" accept=".csv"/>
    <button id="btn-try-storage">Browser Storage</button>
    <button id="btn-cloud" class="primary" style="background:#4a8a52;border-color:#4a8a52">☁ Load from Cloud</button>
    <input type="date" id="filter-date"/>
    <button id="btn-clear" class="primary">Clear</button>
  </div>
</header>

<div class="container" id="container">
  <!-- populated by render() -->
</div>

<div class="toast" id="toast"></div>

<script>
// =============================================================
// STATE — sessions loaded from CSV or localStorage
// =============================================================

const STATE = {
  sessions: [],          // planned sessions from Production Supe
  actuals: [],           // tracker actuals
  filter_date: null,     // ISO date string or null = show all
  source: null,          // 'csv' or 'localStorage'
  view: 'day'            // 'day' or 'report'
};

// =============================================================
// HELPERS
// =============================================================

function fmt(n, dp = 0) {
  if (n === '' || n === null || n === undefined) return '—';
  const v = parseFloat(n);
  if (!isFinite(v) || isNaN(v)) return '—';
  return v.toLocaleString('en-AU', { minimumFractionDigits: dp, maximumFractionDigits: dp });
}
function fmtMoney(n, dp = 2) {
  if (n === '' || n === null || n === undefined) return '—';
  const v = parseFloat(n);
  if (!isFinite(v) || isNaN(v)) return '—';
  return '$' + fmt(v, dp);
}
function bottleneckLabel(b) { return { truck: 'TRUCK', dig: 'DIG', dump: 'DUMP', balanced: 'BALANCED' }[b] || (b || '—').toUpperCase(); }
function bottleneckClass(b) { return 'b-' + (b || 'balanced'); }

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toast._timer);
  toast._timer = setTimeout(() => t.classList.remove('show'), 2400);
}

// =============================================================
// CSV PARSING — handles quoted fields
// =============================================================

function parseCSV(text) {
  const lines = text.split(/\r?\n/).filter(l => l.length > 0);
  if (lines.length < 2) return [];
  const headers = parseCSVLine(lines[0]);
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const fields = parseCSVLine(lines[i]);
    if (fields.length === 0) continue;
    const obj = {};
    headers.forEach((h, idx) => { obj[h] = fields[idx] ?? ''; });
    rows.push(obj);
  }
  return rows;
}
function parseCSVLine(line) {
  const result = [];
  let cur = '';
  let inQuote = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (inQuote) {
      if (c === '"' && line[i + 1] === '"') { cur += '"'; i++; }
      else if (c === '"') { inQuote = false; }
      else { cur += c; }
    } else {
      if (c === ',') { result.push(cur); cur = ''; }
      else if (c === '"') { inQuote = true; }
      else { cur += c; }
    }
  }
  result.push(cur);
  return result;
}

// =============================================================
// LOAD DATA
// =============================================================

// Find a column value by trying several common header variants (case-insensitive).
function colVal(row, ...candidates) {
  const keys = Object.keys(row);
  for (const cand of candidates) {
    const candL = cand.toLowerCase().replace(/[_\s-]/g, '');
    for (const k of keys) {
      const kL = k.toLowerCase().replace(/[_\s-]/g, '');
      if (kL === candL && row[k] !== '' && row[k] !== null && row[k] !== undefined) return row[k];
    }
  }
  return '';
}

function loadTrackerCSV(text) {
  const rows = parseCSV(text);
  if (rows.length === 0) { toast('Empty tracker CSV'); return; }
  STATE.actuals = rows.map(r => {
    // Forgiving column mapping — supports tracker exports + simple custom format
    const dateRaw = colVal(r, 'date', 'shift_date', 'shift date');
    let date = dateRaw;
    // Normalise common date formats to ISO
    if (date && date.includes('/')) {
      const parts = date.split('/');
      if (parts.length === 3 && parts[2].length === 4) {
        date = `${parts[2]}-${parts[1].padStart(2, '0')}-${parts[0].padStart(2, '0')}`;
      }
    }
    if (date && date.length > 10) date = date.slice(0, 10);  // strip timestamps
    return {
      date,
      cost_code: colVal(r, 'cost_code', 'cost code', 'job', 'job_id', 'activity_code', 'job_description'),
      actual_bcm: parseFloat(colVal(r, 'actual_bcm', 'bcm', 'production', 'production_bcm', 'actual_production', 'volume', 'volume_bcm')) || 0,
      actual_cost: parseFloat(colVal(r, 'actual_cost', 'cost', 'total_cost', 'cost_aud')) || 0,
      hours_worked: parseFloat(colVal(r, 'hours_worked', 'hours', 'smu_actual', 'actual_smu', 'smu')) || 0,
      weather: colVal(r, 'weather', 'weather_actual'),
      dig_conditions: colVal(r, 'dig_conditions', 'dig conditions', 'conditions'),
      notes: colVal(r, 'notes', 'comments', 'remarks')
    };
  }).filter(a => a.date && a.cost_code);
  toast(`Loaded ${STATE.actuals.length} actuals row${STATE.actuals.length === 1 ? '' : 's'} from tracker`);
  render();
}

// Match planned session(s) to actual(s) by date + cost_code (fuzzy on whitespace/case).
function normaliseCostCode(s) {
  return (s || '').toLowerCase().replace(/\s+/g, ' ').trim();
}
function findActualFor(session) {
  if (STATE.actuals.length === 0) return null;
  const sCode = normaliseCostCode(session.cost_code);
  // Exact date + cost code match preferred
  let m = STATE.actuals.find(a => a.date === session.date && normaliseCostCode(a.cost_code) === sCode);
  if (m) return m;
  // Loose: contains either way
  m = STATE.actuals.find(a => a.date === session.date && (
    normaliseCostCode(a.cost_code).includes(sCode) || sCode.includes(normaliseCostCode(a.cost_code))
  ));
  return m || null;
}

function loadFromCSV(text) {
  const rows = parseCSV(text);
  STATE.sessions = rows.map(r => ({
    id: r.session_id,
    timestamp: r.timestamp,
    version: r.version,
    date: r.date || (r.timestamp ? r.timestamp.slice(0, 10) : ''),
    weather: r.weather || '',
    cost_code: r.cost_code || '',
    activity: r.activity || '',
    shift: r.shift || '',
    excavator: r.excavator,
    exc_class: r.exc_class,
    truck_class: r.truck_class,
    truck_count: parseInt(r.truck_count) || 0,
    material: r.material,
    planned_smu: parseFloat(r.planned_smu) || 0,
    distance_km: parseFloat(r.distance_km) || 0,
    bottleneck: r.predicted_bottleneck,
    match_factor: parseFloat(r.predicted_match_factor) || 0,
    trucks_needed: parseFloat(r.predicted_trucks_needed) || 0,
    production_bcm: parseFloat(r.predicted_production_bcm) || 0,
    bcm_per_smu: parseFloat(r.predicted_bcm_per_smu) || 0,
    cost_per_bcm: parseFloat(r.predicted_cost_per_bcm) || 0,
    cost_per_bcm_primary: parseFloat(r.predicted_cost_per_bcm_primary) || 0,
    total_cost: parseFloat(r.predicted_total_cost_full) || parseFloat(r.predicted_total_cost_working) || 0,
    cost_primary: parseFloat(r.predicted_cost_primary) || 0,
    cost_ancillaries: parseFloat(r.predicted_cost_ancillaries) || 0,
    cost_labour: parseFloat(r.predicted_cost_labour) || 0,
    cost_fuel: parseFloat(r.predicted_cost_fuel) || 0,
    fuel_L: parseFloat(r.predicted_fuel_L) || 0,
    passes: parseInt(r.predicted_passes) || 0,
    payload_bcm: parseFloat(r.predicted_payload_bcm) || 0,
    loads_per_truck: parseFloat(r.predicted_loads_per_truck) || 0,
    Z: parseFloat(r.predicted_Z) || 0,
    BB: parseFloat(r.predicted_BB) || 0,
    DD: parseFloat(r.predicted_DD) || 0,
    actual_bcm: parseFloat(r.actual_production_bcm) || null,
    actual_cost: parseFloat(r.actual_cost) || null,
    loss_reasons: (r.opportunity_loss_reasons || '').split(';').filter(Boolean),
    notes: r.notes || ''
  })).filter(s => s.cost_code || s.production_bcm > 0);
  STATE.source = 'csv';
  // Default filter to latest date in the data
  const dates = [...new Set(STATE.sessions.map(s => s.date).filter(Boolean))].sort();
  STATE.filter_date = dates[dates.length - 1] || null;
  const dateEl = document.getElementById('filter-date');
  if (STATE.filter_date) dateEl.value = STATE.filter_date;
  render();
  toast(`Loaded ${STATE.sessions.length} sessions from CSV`);
}

function loadFromLocalStorage() {
  try {
    const raw = localStorage.getItem('stratum_supe_sessions_v1_1');
    if (!raw) {
      toast('No sessions in this browser\'s storage. Try CSV import.');
      return;
    }
    const sessions = JSON.parse(raw);
    STATE.sessions = sessions.map(s => ({
      id: s.id,

function filtered() {
  if (!STATE.filter_date) return STATE.sessions;
  return STATE.sessions.filter(s => s.date === STATE.filter_date);
}

function pitRollup(sessions) {
  if (sessions.length === 0) return null;
  let total_bcm = 0, total_cost = 0;
  let bottleneck_counts = { balanced: 0, dig: 0, truck: 0, dump: 0 };
  let exc_count = 0, total_truck_count = 0;
  let total_fuel_L = 0;
  let total_smu = 0;
  const fleet_by_exc = {};
  const fleet_by_truck = {};
  sessions.forEach(s => {
    total_bcm += s.production_bcm || 0;
    total_cost += s.total_cost || 0;
    total_smu += s.planned_smu || 0;
    total_fuel_L += s.fuel_L || 0;
    if (s.bottleneck && bottleneck_counts[s.bottleneck] !== undefined) bottleneck_counts[s.bottleneck]++;
    if (s.excavator) {
      exc_count++;
      fleet_by_exc[s.excavator] = (fleet_by_exc[s.excavator] || 0) + 1;
    }
    if (s.truck_class && s.truck_count) {
      total_truck_count += s.truck_count;
      fleet_by_truck[s.truck_class] = (fleet_by_truck[s.truck_class] || 0) + s.truck_count;
    }
  });
  const weighted_cost_per_bcm = total_bcm > 0 ? total_cost / total_bcm : 0;
  return {
    n: sessions.length,
    total_bcm, total_cost, weighted_cost_per_bcm,
    bottleneck_counts, exc_count, total_truck_count,
    total_fuel_L, total_smu,
    fleet_by_exc, fleet_by_truck
  };
}

const PB_SUPERVISORS = [

  { id: 'belinda', name: 'Belinda Forshaw' },

function pbEnsureViewer() {
  if (!STATE.viewer) {
    const saved = localStorage.getItem('pb_viewer_id');
    STATE.viewer = { id: saved || 'stevie', mode: 'mine' };
  }
  // Stevie sees 'all' by default; supervisors see 'mine'
  if (!STATE.viewer.mode) STATE.viewer.mode = STATE.viewer.id === 'stevie' ? 'all' : 'mine';
}

// Best-effort: turn a free-text supervisor name from a session into a roster id
function pbNormalizeSupervisor(supText) {
  if (!supText) return null;
  const s = String(supText).toLowerCase();
  for (const sup of PB_SUPERVISORS) {
    if (s.includes(sup.id)) return sup.id;
    const first = sup.name.split(' ')[0].toLowerCase();
    if (s.includes(first)) return sup.id;
  }
  return null;
}

// True if this entry should be visible to the current viewer per privacy rules.
function pbCanView(entry, sessionOwnerId) {
  pbEnsureViewer();
  const viewer = STATE.viewer.id;
  const mode = STATE.viewer.mode;
  const isOwn = sessionOwnerId === viewer;
  const isAssignedToMe = entry.assigned_to === viewer;
  const isEscalated = entry.status === 'escalated';
  // Stevie sees escalated items even if not the explicit assignee
  const stevieSeesEscalated = viewer === 'stevie' && isEscalated;
  if (mode === 'all')       return true;
  if (mode === 'escalated') return isEscalated && (isAssignedToMe || isOwn || viewer === 'stevie');
  // 'mine' (default): own entries + items assigned to me + escalated items if I'm Stevie
  return isOwn || isAssignedToMe || stevieSeesEscalated;
}

// HTML escape helper (in case earlier escape isn't loaded yet in this scope)
function pbEsc(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]));
}

function pbStatusBadge(status) {
  const cfg = { open: { col: 'var(--text2)', label: 'open' }, resolved: { col: 'var(--green)', label: '✓ resolved' }, escalated: { col: 'var(--ochre)', label: '↑ escalated' } }[status] || { col: 'var(--text2)', label: status || 'open' };
  return '<span style="color:' + cfg.col + ';font-family:\'Barlow Condensed\';text-transform:uppercase;letter-spacing:0.06em;font-size:10px;font-weight:600;">' + cfg.label + '</span>';
}

function pbSupName(id) {
  const s = PB_SUPERVISORS.find(x => x.id === id);
  return s ? s.name : (id || 'unknown');
}

// Build the per-viewer filtered HELP reconciliation.
// Returns the same shape as buildHelpReport: { H, L, E, P, HELP, n_sessions, n_actuals }
// but each item is now an enriched HTML string showing owner + date + status.
function buildHelpReportFiltered(allSessions) {
  pbEnsureViewer();
  const out = { H: [], L: [], E: [], P: [], HELP: [], n_sessions: allSessions.length, n_actuals: 0 };
  const categoryMap = {
    highlights:  'H',
    lowlights:   'L',
    emerging:    'E',
    priorities:  'P',
    help_needed: 'HELP',
    actions:     'P',  // arising actions go into priorities bucket but tagged [ACTION]
  };
  allSessions.forEach(s => {
    const insp = s.inspection || (s.raw_json && s.raw_json.inspection);
    if (!insp || !insp.help_entries) return;
    const supTxt = s.supervisor || (s.raw_json && s.raw_json.supervisor) || '';
    const supId = pbNormalizeSupervisor(supTxt);
    const supName = supId ? pbSupName(supId) : (supTxt || 'unknown');
    const date = s.date || '';
    Object.entries(insp.help_entries).forEach(([cat, entries]) => {
      const bucket = categoryMap[cat];
      if (!bucket) return;
      (entries || []).forEach(e => {
        const entry = typeof e === 'string' ? { text: e, status: 'open', assigned_to: null } : e;
        if (!pbCanView(entry, supId)) return;
        const owner = supId === STATE.viewer.id ? '<em>(you)</em>' : pbEsc(supName);
        const assignedTo = entry.assigned_to ? ' → <strong>' + pbEsc(pbSupName(entry.assigned_to)) + '</strong>' : '';
        const actionPrefix = cat === 'actions' ? '<strong>[ACTION]</strong> ' : '';
        const tag = '<em style="color:var(--text2);font-size:11px;">— ' + owner + ', ' + date + assignedTo + ' · ' + pbStatusBadge(entry.status) + '</em>';
        out[bucket].push(actionPrefix + pbEsc(entry.text) + ' ' + tag);
      });
    });
  });
  return out;
}

function buildHelpReport(allSessions) {
  const H = [], L = [], E = [], P = [], HELP = [];
  if (allSessions.length === 0) return { H, L, E, P, HELP, n_sessions: 0, n_actuals: 0 };

  // v1.9 — Pull supervisor-entered HELP entries from each session
  // Sessions cloud-loaded have raw_json embedded; CSV-loaded sessions don't.
  allSessions.forEach(s => {
    // Try multiple locations: cloud raw_json, localStorage inspection field
    const insp = s.inspection || (s.raw_json && s.raw_json.inspection) || null;
    if (!insp || !insp.help_entries) return;
    const sup = s.supervisor || (s.raw_json && s.raw_json.supervisor) || 'unknown supervisor';
    const date = s.date || '';
    const tag = `<em style="color:var(--text2);font-size:11px;">— ${escapeHtmlPB(sup)}, ${date}</em>`;
    const he = insp.help_entries;
    (he.highlights || []).forEach(t => H.push(`${escapeHtmlPB(t)} ${tag}`));
    (he.lowlights || []).forEach(t => L.push(`${escapeHtmlPB(t)} ${tag}`));
    (he.emerging || []).forEach(t => E.push(`${escapeHtmlPB(t)} ${tag}`));
    (he.priorities || []).forEach(t => P.push(`${escapeHtmlPB(t)} ${tag}`));
    (he.help_needed || []).forEach(t => HELP.push(`${escapeHtmlPB(t)} ${tag}`));
    // arising actions go into P as "[ACTION] text"
    (he.actions || []).forEach(t => P.push(`<strong>[ACTION]</strong> ${escapeHtmlPB(t)} ${tag}`));
  });

  // After supervisor-entered items, the inferred items get appended below.


  const r = pitRollup(allSessions);
  const bc = r.bottleneck_counts;
  const n = allSessions.length;

  // Sort by cost per BCM (excluding zeros)
  const costed = allSessions.filter(s => s.cost_per_bcm > 0).sort((a, b) => a.cost_per_bcm - b.cost_per_bcm);
  if (costed.length >= 1) {
    const best = costed[0];
    H.push(`<strong>${best.cost_code}</strong> running at <strong>${fmtMoney(best.cost_per_bcm, 2)}/bcm</strong> on ${best.date} — lowest unit cost in the dataset (${fmt(best.production_bcm, 0)} bcm, ${best.excavator} + ${best.truck_count}×${best.truck_class})`);
    if (costed.length >= 3) {
      const median = costed[Math.floor(costed.length / 2)];
      H.push(`Median pit unit cost is <strong>${fmtMoney(median.cost_per_bcm, 2)}/bcm</strong> across ${n} planned operation${n > 1 ? 's' : ''}`);
    }
    const worst = costed[costed.length - 1];
    if (costed.length > 1 && worst.cost_per_bcm > best.cost_per_bcm * 1.3) {
      L.push(`<strong>${worst.cost_code}</strong> at <strong>${fmtMoney(worst.cost_per_bcm, 2)}/bcm</strong> on ${worst.date} — ${((worst.cost_per_bcm / best.cost_per_bcm - 1) * 100).toFixed(0)}% above best-performer. ${worst.bottleneck.toUpperCase()}-constrained.`);
    }
  }

  // Bottleneck distribution
  if (bc.balanced && bc.balanced / n > 0.5) {
    H.push(`<strong>${bc.balanced}/${n}</strong> operation${bc.balanced > 1 ? 's are' : ' is'} well-matched (match factor 0.95-1.05) — fleet allocation discipline is holding`);
  }
  if (bc.truck && bc.truck / n > 0.3) {
    L.push(`<strong>${bc.truck}/${n}</strong> operations are truck-constrained — production loss accumulating across the pit`);
    E.push(`Chronic truck under-allocation (${((bc.truck/n)*100).toFixed(0)}% of ops) — likely a structural fleet shortfall rather than rotation issue`);
  }
  if (bc.dig && bc.dig / n > 0.4 && bc.balanced === 0) {
    E.push(`No balanced operations in the dataset — most ops dig-bound which means trucks waiting and standby cost bleeding`);
  }
  if (bc.dump > 0) {
    E.push(`${bc.dump} dump-constrained operation${bc.dump > 1 ? 's' : ''} — review dump face width, sequencing, or compaction process`);
  }

  // Mismatch detection (low-quality should be dig, high-quality should be dump)
  const mismatches = allSessions.filter(s => {
    if (!s.bottleneck || s.bottleneck === 'balanced') return false;
    // Use shift assumption: 'high' quality should be dump, others should be dig
    // This isn't perfect because we don't have explicit quality field — proxy from material
    if (s.material && (s.material.includes('topsoil') || s.material.includes('embankment'))) return s.bottleneck !== 'dump';
    return s.bottleneck === 'truck'; // most waste ops should not be truck-constrained
  });
  if (mismatches.length > 0) {
    L.push(`<strong>${mismatches.length}</strong> operation${mismatches.length > 1 ? 's have' : ' has'} bottleneck mismatched to activity quality — re-balance fleet to suit work type`);
  }

  // Match factor outliers
  const farFromBalance = allSessions.filter(s => s.match_factor && (s.match_factor < 0.80 || s.match_factor > 1.25));
  if (farFromBalance.length > 0) {
    E.push(`<strong>${farFromBalance.length}</strong> operation${farFromBalance.length > 1 ? 's are' : ' is'} more than 20% off match — fleet sizing review needed`);
  }

  // Loss reasons aggregation
  const reasonCounts = {};
  allSessions.forEach(s => (s.loss_reasons || []).forEach(rsn => { reasonCounts[rsn] = (reasonCounts[rsn] || 0) + 1; }));
  const topReasons = Object.entries(reasonCounts).sort((a, b) => b[1] - a[1]).slice(0, 3);
  topReasons.forEach(([reason, count]) => {
    const niceReason = reason.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
    E.push(`Recurring captured loss reason: <strong>${niceReason}</strong> — ${count} occurrence${count > 1 ? 's' : ''} across the dataset`);
  });

  // Plan vs actual analysis (if actuals loaded)
  if (STATE.actuals.length > 0) {
    let totalPlan = 0, totalActual = 0, matchedSessions = 0;
    let p_cost = 0, a_cost = 0;
    allSessions.forEach(s => {
      const act = findActualFor(s);
      if (act) {
        matchedSessions++;
        totalPlan += s.production_bcm || 0;
        totalActual += act.actual_bcm || 0;
        p_cost += s.total_cost || 0;
        a_cost += act.actual_cost || 0;
      }
    });
    if (matchedSessions > 0) {
      const gapPct = totalPlan > 0 ? (totalActual - totalPlan) / totalPlan : 0;
      const costGapPct = p_cost > 0 ? (a_cost - p_cost) / p_cost : 0;
      if (gapPct > 0.05) H.push(`Actual production is <strong>+${(gapPct*100).toFixed(1)}%</strong> vs plan (${fmt(totalActual - totalPlan, 0)} bcm above target) across ${matchedSessions} reconciled op${matchedSessions > 1 ? 's' : ''}`);
      if (gapPct < -0.05) L.push(`Actual production is <strong>${(gapPct*100).toFixed(1)}%</strong> vs plan (${fmt(Math.abs(totalActual - totalPlan), 0)} bcm shortfall) across ${matchedSessions} reconciled op${matchedSessions > 1 ? 's' : ''}`);
      if (costGapPct > 0.05) L.push(`Actual cost <strong>+${(costGapPct*100).toFixed(1)}%</strong> vs plan (${fmtMoney(a_cost - p_cost, 0)} overrun) — investigate cost drivers in the variance ops`);
      const unmatched = allSessions.length - matchedSessions;
      if (unmatched > 0) E.push(`<strong>${unmatched}</strong> planned op${unmatched > 1 ? 's' : ''} with no actuals matched — either tracker data missing or cost code drift`);
    }
  }

  // Reallocation opportunities → priorities
  const opps = reallocationOpportunities(allSessions);
  if (opps.length > 0) {
    opps.slice(0, 4).forEach(o => {
      P.push(`Move <strong>${o.truck_count} truck${o.truck_count > 1 ? 's' : ''}</strong> from <strong>${o.from.cost_code}</strong> (over-trucked, dig-constrained) to <strong>${o.to.cost_code}</strong> (under-trucked)${o.sameClass ? '' : ' — cross-class swap'}`);
    });
  }
  // Lowest match-factor ops → priority
  const worstMatched = [...allSessions].filter(s => s.match_factor < 0.90 || s.match_factor > 1.20)
                                       .sort((a, b) => Math.abs(1 - a.match_factor) - Math.abs(1 - b.match_factor))
                                       .reverse().slice(0, 3);
  worstMatched.forEach(s => {
    P.push(`Re-balance <strong>${s.cost_code}</strong> — match ${s.match_factor.toFixed(2)} (${s.bottleneck}-constrained, ${s.truck_count}×${s.truck_class})`);
  });

  // Repeated cost codes appearing in worst bands
  const codeStats = {};
  allSessions.forEach(s => {
    if (!s.cost_code) return;
    if (!codeStats[s.cost_code]) codeStats[s.cost_code] = { n: 0, sum_cost: 0, sum_bcm: 0, bottlenecks: {} };
    codeStats[s.cost_code].n++;
    codeStats[s.cost_code].sum_cost += s.total_cost || 0;
    codeStats[s.cost_code].sum_bcm += s.production_bcm || 0;
    codeStats[s.cost_code].bottlenecks[s.bottleneck] = (codeStats[s.cost_code].bottlenecks[s.bottleneck] || 0) + 1;
  });
  const recurringPoor = Object.entries(codeStats).filter(([_, stat]) => stat.n >= 2 && stat.bottlenecks.truck >= 2);
  recurringPoor.forEach(([code, stat]) => {
    P.push(`<strong>${code}</strong> truck-constrained on ${stat.bottlenecks.truck} of ${stat.n} shifts — structural fleet shortage, not isolated incident`);
  });

  // HELP requests for senior leadership
  if (bc.dig / n > 0.5) {
    HELP.push(`<strong>Upsize the primary excavator</strong> on the pit's dominant operations — most ops are dig-bound, more bucket capacity translates to immediate production lift`);
  }
  if (bc.truck / n > 0.3) {
    HELP.push(`<strong>Approve additional truck allocation</strong> — current fleet under-trucks consistently. Cost of incremental trucks below cost of production loss`);
  }
  if (topReasons.some(([rsn]) => rsn.includes('haul_road') || rsn.includes('haul'))) {
    HELP.push(`<strong>Capital approval for haul road grading programme</strong> — recurring haul road conditions hitting rolling resistance and cycle times`);
  }
  if (topReasons.some(([rsn]) => rsn.includes('operator') || rsn.includes('crew'))) {
    HELP.push(`<strong>Operator training and retention programme</strong> — operator factor is showing up as a recurring loss event`);
  }
  if (topReasons.some(([rsn]) => rsn.includes('reliability_unplanned') || rsn.includes('mechanical'))) {
    HELP.push(`<strong>Preventive maintenance window or critical spares investment</strong> — unplanned reliability events recurring in the dataset`);
  }
  if (topReasons.some(([rsn]) => rsn.includes('weather'))) {
    HELP.push(`<strong>Wet-weather contingency plan</strong> — weather is a captured loss driver, possible scheduling or shelter investment`);
  }
  if (STATE.actuals.length === 0 && allSessions.length > 0) {
    HELP.push(`<strong>Sustain the moat capture</strong> — load actual production data via the tracker CSV so plan vs actual reconciliation can run. Right now we're flying blind on actuals.`);
  }
  if (HELP.length === 0) {
    HELP.push(`Operations look balanced and well-equipped from the data on hand — keep the moat capture cadence going and surface new asks as patterns emerge`);
  }

  return { H, L, E, P, HELP, n_sessions: n, n_actuals: STATE.actuals.length };
}

function reallocationOpportunities(sessions) {
  // Find pairs where one is truck-constrained (could use more trucks) and one is dig-constrained
  // (has surplus trucks). Same truck class first; cross-class as a stretch.
  const opps = [];
  const under = sessions.filter(s => s.bottleneck === 'truck' && s.match_factor < 0.95);
  const over = sessions.filter(s => s.bottleneck === 'dig' && s.match_factor > 1.05);
  under.forEach(u => {
    over.forEach(o => {
      if (u.id === o.id) return;
      const sameClass = u.truck_class === o.truck_class;
      const u_short = u.trucks_needed - u.truck_count;     // how many trucks u needs
      const o_excess = o.truck_count - o.trucks_needed;    // how many trucks o has extra
      const transferable = Math.min(Math.ceil(u_short), Math.floor(o_excess));
      if (transferable >= 1) {
        opps.push({
          from: o, to: u,
          truck_count: transferable,
          sameClass,
          rationale: sameClass
            ? `${o.cost_code} has ${o_excess.toFixed(1)} ${o.truck_class}-class trucks of standby cost. ${u.cost_code} is short by ${u_short.toFixed(1)} of same class. Move ${transferable}.`
            : `${o.cost_code} is over-trucked on ${o.truck_class}s; ${u.cost_code} is under-trucked on ${u.truck_class}s. Cross-class swap if classes are interchangeable in your fleet.`
        });
      }
    });
  });
  // Dedupe by (from.id, to.id, truck_count)
  const seen = new Set();
  return opps.filter(o => {
    const k = `${o.from.id}|${o.to.id}|${o.truck_count}`;
    if (seen.has(k)) return false;
    seen.add(k); return true;
  });
}
