// =============================================================
// v1.9.1 — RAR VIEW: 8-day rolling snapshot with volume, cost, utilisation charts
// Format mirrors Tim's RAR — banded background, on-track/off-track coloured bars,
// dotted target line. Period default = last 8 days ending most recent saved date.
// =============================================================
const RAR_DEFAULTS = {
  target_bcm_per_day: 8400,    // regular daily target
  stretch_bcm_per_day: 8700,   // stretch target
  day1_reduction: 0.04,        // 4% reduction on day 1 (safety startup)
  target_cost_per_bcm: 3.15,   // baseline budget $/bcm (HCOC current)
  stretch_cost_per_bcm: 3.05,  // stretch cost (3% better than budget)
  period_days: 8,              // 8:6 roster → 8 day on-cycle. Move to 14 when 7:7 continuous.
  period_end: '2026-05-19',    // most recent roster end
};

function ensureRarState() {
  // v1.9.2 — period_end defaults to yesterday (we report on day-prior actuals)
  const yest = new Date();
  yest.setDate(yest.getDate() - 1);
  const yestISO = yest.toISOString().slice(0, 10);
  const defaults = { ...RAR_DEFAULTS, period_end: yestISO };
  if (!STATE.rar) STATE.rar = { ...defaults };
  for (const k in defaults) if (STATE.rar[k] === undefined) STATE.rar[k] = defaults[k];
}

// Returns array of N day-records ending on period_end, oldest first.
// Each: { date, dateLabel, dow, target_bcm, actual_bcm, planned_bcm,
//         actual_cost_per_bcm, planned_cost_per_bcm, sessions_count }
function buildRarDays() {
  ensureRarState();
  const cfg = STATE.rar;
  const end = new Date(cfg.period_end + 'T00:00:00');
  const days = [];
  for (let i = cfg.period_days - 1; i >= 0; i--) {
    const d = new Date(end);
    d.setDate(end.getDate() - i);
    const iso = d.toISOString().slice(0, 10);
    const dow = d.toLocaleDateString('en-AU', { weekday: 'short' });
    const dateLabel = d.toLocaleDateString('en-AU', { day: '2-digit', month: 'short' }).replace(/\s/g, '-');
    days.push({ date: iso, dateLabel, dow });
  }
  // Day 1 (oldest) gets the day-1 reduction
  days.forEach((d, i) => {
    d.target_bcm = i === 0 ? cfg.target_bcm_per_day * (1 - cfg.day1_reduction) : cfg.target_bcm_per_day;
    d.stretch_bcm = i === 0 ? cfg.stretch_bcm_per_day * (1 - cfg.day1_reduction) : cfg.stretch_bcm_per_day;
    // Collect sessions for this date
    const dayS = STATE.sessions.filter(s => s.date === d.date);
    d.sessions_count = dayS.length;
    d.planned_bcm = dayS.reduce((s, x) => s + (x.production_bcm || 0), 0);
    d.actual_bcm = dayS.reduce((s, x) => s + (x.actual_bcm != null ? x.actual_bcm : 0), 0);
    // bcm-weighted cost
    const totPlannedBcm = dayS.reduce((s, x) => s + (x.production_bcm || 0), 0);
    const totPlannedCost = dayS.reduce((s, x) => s + (x.cost_per_bcm || 0) * (x.production_bcm || 0), 0);
    d.planned_cost_per_bcm = totPlannedBcm > 0 ? totPlannedCost / totPlannedBcm : null;
    const totActualBcm = dayS.reduce((s, x) => s + (x.actual_bcm || 0), 0);
    const totActualCost = dayS.reduce((s, x) => s + (x.actual_cost || 0), 0);
    d.actual_cost_per_bcm = totActualBcm > 0 ? totActualCost / totActualBcm : null;
    // Use actual if available; else planned
    d.display_bcm = d.actual_bcm > 0 ? d.actual_bcm : d.planned_bcm;
    d.display_cost = d.actual_cost_per_bcm != null ? d.actual_cost_per_bcm : d.planned_cost_per_bcm;
    d.is_actual = d.actual_bcm > 0;
  });
  // v1.9.1 — Compute cumulative actuals + cumulative target across the period (for dotted lines)
  let cumActualBcm = 0, cumTargetBcm = 0, cumStretchBcm = 0;
  let cumActualCost = 0, cumActualBcmForCost = 0;
  days.forEach(d => {
    cumActualBcm += d.display_bcm || 0;
    cumTargetBcm += d.target_bcm;
    cumStretchBcm += d.stretch_bcm;
    if (d.actual_cost_per_bcm != null && d.actual_bcm > 0) {
      cumActualCost += d.actual_cost_per_bcm * d.actual_bcm;
      cumActualBcmForCost += d.actual_bcm;
    } else if (d.planned_cost_per_bcm != null && d.planned_bcm > 0) {
      cumActualCost += d.planned_cost_per_bcm * d.planned_bcm;
      cumActualBcmForCost += d.planned_bcm;
    }
    d.cum_actual_bcm = cumActualBcm;
    d.cum_target_bcm = cumTargetBcm;
    d.cum_stretch_bcm = cumStretchBcm;
    d.cum_cost_per_bcm = cumActualBcmForCost > 0 ? cumActualCost / cumActualBcmForCost : null;
  });
  return days;
}



// v1.9.2 — Insight builder: pulls "so what" narrative for the period.
// Driver analysis: actual dig rate vs plan, UofA vs plan, top loss reasons.
function buildRarInsights(days) {
  // Restrict source sessions to those whose date lies within the period (today-1 minus N+1 days)
  const dayDates = new Set(days.map(d => d.date));
  const sessionsInPeriod = STATE.sessions.filter(s => dayDates.has(s.date));

  // Schedule — actual vs target volume, dig rate, UofA
  const totActualBcm  = days.reduce((s, d) => s + (d.actual_bcm || 0), 0);
  const totPlannedBcm = days.reduce((s, d) => s + (d.planned_bcm || 0), 0);
  const totTargetBcm  = days.reduce((s, d) => s + d.target_bcm, 0);
  const totStretchBcm = days.reduce((s, d) => s + d.stretch_bcm, 0);
  const display_total = totActualBcm > 0 ? totActualBcm : totPlannedBcm;
  const schedPct  = totTargetBcm  > 0 ? (display_total / totTargetBcm  - 1) * 100 : 0;
  const stretchPct = totStretchBcm > 0 ? (display_total / totStretchBcm - 1) * 100 : 0;

  // Dig rate: bcm/SMU actual vs planned (use sessions only)
  let actualBcm = 0, actualSmu = 0, plannedBcm = 0, plannedSmu = 0;
  sessionsInPeriod.forEach(s => {
    actualBcm  += s.actual_bcm    || 0;
    actualSmu  += s.actual_hrs    || 0;   // tracker CSV may bring actual SMU
    plannedBcm += s.production_bcm|| 0;
    plannedSmu += s.planned_smu   || 0;
  });
  const useActualSmu = actualSmu > 0;
  const digActual  = useActualSmu && actualSmu > 0 ? actualBcm / actualSmu : 0;
  const digPlanned = plannedSmu > 0 ? plannedBcm / plannedSmu : 0;
  const digDelta   = digPlanned > 0 && digActual > 0 ? (digActual / digPlanned - 1) * 100 : null;

  // UofA — actual SMU achieved divided by planned SMU (proxy for utilisation × availability)
  const uofA = (useActualSmu && plannedSmu > 0) ? (actualSmu / plannedSmu) : null;
  const uofADelta = uofA != null ? (uofA - 1) * 100 : null;

  // Cost — weighted-average actual vs target
  const totActualCost = days.reduce((s, d) => s + ((d.actual_cost_per_bcm || 0) * (d.actual_bcm || 0)), 0);
  const totActualBcmForCost = days.reduce((s, d) => s + (d.actual_bcm || 0), 0);
  const avgActualCost = totActualBcmForCost > 0 ? totActualCost / totActualBcmForCost : null;
  const targetCost = STATE.rar.target_cost_per_bcm;
  const costPct = (avgActualCost != null && targetCost > 0) ? (avgActualCost / targetCost - 1) * 100 : null;

  // Cost breakdown — find biggest variances across sessions
  let totPrim = 0, totAnc = 0, totLab = 0, totFuel = 0, totN = 0;
  sessionsInPeriod.forEach(s => {
    totPrim += s.cost_primary     || 0;
    totAnc  += s.cost_ancillaries || 0;
    totLab  += s.cost_labour      || 0;
    totFuel += s.cost_fuel        || 0;
    totN += 1;
  });
  const costMix = { primary: totPrim, ancillaries: totAnc, labour: totLab, fuel: totFuel };
  // Sort cost categories by share for top contributors
  const costSorted = Object.entries(costMix).sort((a, b) => b[1] - a[1]).slice(0, 3);

  // Loss reasons — aggregate
  const lossCounts = {};
  const lossBcm    = {};
  sessionsInPeriod.forEach(s => {
    (s.loss_reasons || []).forEach(reason => {
      lossCounts[reason] = (lossCounts[reason] || 0) + 1;
      lossBcm[reason] = (lossBcm[reason] || 0) + (s.lost_production || 0);
    });
  });
  const topLosses = Object.entries(lossCounts).sort((a, b) => b[1] - a[1]).slice(0, 3);

  return {
    schedule: { displayTotal: display_total, totTarget: totTargetBcm, totStretch: totStretchBcm,
                pct: schedPct, stretchPct, digActual, digPlanned, digDelta, uofA, uofADelta },
    cost:     { avgActual: avgActualCost, target: targetCost, pct: costPct,
                breakdown: costSorted, has_actuals: avgActualCost != null },
    losses:   { top: topLosses, totals: lossBcm, sessions: totN },
  };
}

function renderRarSoWhatCard(insights) {
  const s = insights.schedule;
  const c = insights.cost;
  const l = insights.losses;
  const schedVerb = s.pct >= 0 ? 'ahead of' : 'behind';
  const schedCol  = s.pct >= 0 ? 'var(--green)' : 'var(--red)';
  const stretchVerb = s.stretchPct >= 0 ? 'above' : 'below';
  const stretchCol  = s.stretchPct >= 0 ? 'var(--green)' : 'var(--ochre)';
  const costVerb = (c.pct != null && c.pct <= 0) ? 'under' : 'over';
  const costCol  = (c.pct != null && c.pct <= 0) ? 'var(--green)' : 'var(--red)';

  // Drivers — express in driver language ("driven by X dig rate and Y UofA")
  const driverParts = [];
  if (s.digDelta != null) {
    driverParts.push(`actual dig rate <strong>${fmt(s.digActual, 0)} bcm/SMU</strong> vs plan <strong>${fmt(s.digPlanned, 0)}</strong> <span style="color:${s.digDelta >= 0 ? 'var(--green)' : 'var(--red)'};">[${s.digDelta >= 0 ? '+' : ''}${s.digDelta.toFixed(1)}%]</span>`);
  } else if (s.digPlanned > 0) {
    driverParts.push(`planned dig rate <strong>${fmt(s.digPlanned, 0)} bcm/SMU</strong> <span style="color:var(--text2);">[no actual SMU data yet]</span>`);
  }
  if (s.uofADelta != null) {
    driverParts.push(`UofA <strong>${(s.uofA * 100).toFixed(0)}%</strong> vs plan <span style="color:${s.uofADelta >= 0 ? 'var(--green)' : 'var(--red)'};">[${s.uofADelta >= 0 ? '+' : ''}${s.uofADelta.toFixed(1)}%]</span>`);
  }
  const driversText = driverParts.length > 0 ? `driven by ${driverParts.join(' and ')}` : 'driver attribution needs actual SMU input';

  // Cost narrative
  let costText;
  if (c.avgActual == null) {
    costText = `No actuals reconciled yet for this period. Load the tracker CSV to populate cost variance and driver attribution.`;
  } else {
    const sigCats = c.breakdown.filter(([_, val]) => val > 0).slice(0, 3).map(([name, val]) => {
      const pct = c.breakdown.reduce((sm, x) => sm + x[1], 0) > 0 ? (val / c.breakdown.reduce((sm, x) => sm + x[1], 0)) * 100 : 0;
      return `<strong>${name}</strong> (${pct.toFixed(0)}% of total)`;
    });
    costText = `Actual cost <strong style="color:${costCol};">${Math.abs(c.pct).toFixed(1)}% ${costVerb}</strong> target — <strong>${fmtMoney(c.avgActual, 2)}/bcm</strong> vs <strong>${fmtMoney(c.target, 2)}/bcm</strong>. Composition: ${sigCats.join(', ')}.`;
  }

  // Lost opportunity
  let lossText;
  if (l.top.length === 0) {
    lossText = `No specific loss reasons flagged in the period's ${l.sessions} session(s). Tracker reconciliation populates this once actuals arrive.`;
  } else {
    const lossParts = l.top.map(([reason, count]) => {
      const bcm = l.totals[reason] || 0;
      return `<strong>${escapeHtmlPB(reason)}</strong> (${count} session${count > 1 ? 's' : ''}${bcm > 0 ? ` · ${fmt(bcm, 0)} bcm lost` : ''})`;
    });
    lossText = `Top causes through the period: ${lossParts.join(', ')}.`;
  }

  return `<div class="card" style="background:linear-gradient(135deg, var(--bg2), var(--bg1));border-left:3px solid var(--copper);">
    <div class="card-header">
      <span class="card-title">So what</span>
      <span class="card-subtitle">period summary · consulting narrative</span>
    </div>
    <div style="display:grid;grid-template-columns:1fr;gap:14px;font-family:'Barlow';font-size:13.5px;line-height:1.65;color:var(--text0);">
      <div>
        <div style="color:var(--copperLight);font-weight:700;text-transform:uppercase;letter-spacing:0.10em;font-size:11px;font-family:'Barlow Condensed';margin-bottom:4px;">▸ Schedule</div>
        Actual volume <strong style="color:${schedCol};">${Math.abs(s.pct).toFixed(1)}% ${schedVerb}</strong> planned target (${fmt(s.displayTotal, 0)} bcm vs ${fmt(s.totTarget, 0)} bcm target · <span style="color:${stretchCol};">${Math.abs(s.stretchPct).toFixed(1)}% ${stretchVerb} stretch</span>); ${driversText}.
      </div>
      <div>
        <div style="color:var(--copperLight);font-weight:700;text-transform:uppercase;letter-spacing:0.10em;font-size:11px;font-family:'Barlow Condensed';margin-bottom:4px;">▸ Cost</div>
        ${costText}
      </div>
      <div>
        <div style="color:var(--copperLight);font-weight:700;text-transform:uppercase;letter-spacing:0.10em;font-size:11px;font-family:'Barlow Condensed';margin-bottom:4px;">▸ Lost opportunity</div>
        ${lossText}
      </div>
    </div>
  </div>`;
}


// ── Generic SVG chart helpers ─────────────────────────────────
function rarChartFrame(width, height, title, subtitle) {
  return {
    svgOpen: `<svg viewBox="0 0 ${width} ${height}" preserveAspectRatio="xMidYMid meet" style="width:100%;max-width:1000px;height:auto;display:block;margin:0 auto;background:transparent;">`,
    title, subtitle, width, height,
  };
}

// Volume bar chart
function renderRarVolumeChart(days) {
  const W = 1000, H = 380;
  const padL = 70, padR = 30, padT = 50, padB = 70;
  const chartW = W - padL - padR;
  const chartH = H - padT - padB;
  const maxTarget = Math.max(...days.map(d => d.target_bcm));
  const maxDisplay = Math.max(...days.map(d => d.display_bcm), maxTarget);
  // Round up to nearest 2000
  const yMax = Math.ceil(maxDisplay * 1.15 / 2000) * 2000;
  const yMin = 0;
  const yRange = yMax - yMin;
  const barW = chartW / days.length * 0.65;
  const bandW = chartW / days.length;

  const yToPx = (v) => padT + chartH - ((v - yMin) / yRange) * chartH;

  // On-track band (green tint above target avg)
  const targetAvg = days.reduce((s, d) => s + d.target_bcm, 0) / days.length;
  const targetY = yToPx(targetAvg);
  const onTrackBand = `<rect x="${padL}" y="${padT}" width="${chartW}" height="${targetY - padT}" fill="rgba(74,138,82,0.10)"/>`;
  const offTrackBand = `<rect x="${padL}" y="${targetY}" width="${chartW}" height="${padT + chartH - targetY}" fill="rgba(176,72,48,0.12)"/>`;

  // Y-axis grid + labels
  const yTicks = [];
  for (let v = 0; v <= yMax; v += 2000) {
    yTicks.push(`<line x1="${padL}" y1="${yToPx(v)}" x2="${W - padR}" y2="${yToPx(v)}" stroke="var(--border)" stroke-width="0.5" stroke-dasharray="2 2"/>
                 <text x="${padL - 8}" y="${yToPx(v) + 4}" text-anchor="end" font-family="Barlow Condensed" font-size="11" fill="var(--text2)">${(v/1000).toFixed(0)}k</text>`);
  }

  // Per-day target line (regular) + stretch line + cumulative actual line
  const targetLine = days.map((d, i) => {
    const x1 = padL + i * bandW;
    const x2 = padL + (i + 1) * bandW;
    const y = yToPx(d.target_bcm);
    return `<line x1="${x1}" y1="${y}" x2="${x2}" y2="${y}" stroke="rgba(255,255,255,0.85)" stroke-width="1.5" stroke-dasharray="4 3"/>`;
  }).join('');
  // Stretch line (steeper dashes, copper colour)
  const stretchLine = days.map((d, i) => {
    const x1 = padL + i * bandW;
    const x2 = padL + (i + 1) * bandW;
    const y = yToPx(d.stretch_bcm);
    return `<line x1="${x1}" y1="${y}" x2="${x2}" y2="${y}" stroke="#e8a855" stroke-width="1.5" stroke-dasharray="2 2"/>`;
  }).join('');
  // Cumulative production line (dotted, takes day's running total normalised against day-N target avg)
  // Plot at the per-day-equivalent so it's comparable to bars: cum_actual / days_elapsed
  const cumPts = days.map((d, i) => {
    const dayAvg = (i + 1) > 0 ? d.cum_actual_bcm / (i + 1) : 0;
    const x = padL + i * bandW + bandW / 2;
    const y = yToPx(dayAvg);
    return { x, y, val: dayAvg };
  });
  const cumPath = `M ${cumPts.map(p => `${p.x} ${p.y}`).join(' L ')}`;
  const cumLine = `<path d="${cumPath}" fill="none" stroke="#a8c0a0" stroke-width="2.5" stroke-dasharray="5 3"/>
                   ${cumPts.map(p => `<circle cx="${p.x}" cy="${p.y}" r="3" fill="#a8c0a0" stroke="var(--bg0)" stroke-width="1"/>`).join('')}
                   ${cumPts.map((p, i) => `<text x="${p.x}" y="${p.y - 8}" text-anchor="middle" font-family="Barlow" font-style="italic" font-size="10" fill="#a8c0a0">${fmt(p.val, 0)}</text>`).join('')}`;

  // Bars + labels
  const bars = days.map((d, i) => {
    const x = padL + i * bandW + (bandW - barW) / 2;
    const y = yToPx(d.display_bcm);
    const h = (padT + chartH) - y;
    const onTrack = d.display_bcm >= d.target_bcm;
    const fillCol = h < 1 ? 'var(--border)' : onTrack ? '#4a8a52' : '#b04830';
    const labelY = h < 18 ? y - 6 : y + 14;
    const labelCol = h < 18 ? 'var(--text0)' : 'white';
    const dotted = d.is_actual ? '' : ' stroke-dasharray="3 2" stroke="rgba(255,255,255,0.4)" stroke-width="1"';
    return `<g class="rar-drill" data-rar-drill="${d.date}" style="cursor:pointer;">
      <rect x="${x - 2}" y="${padT}" width="${barW + 4}" height="${chartH}" fill="rgba(255,255,255,0.001)"/>
      <rect x="${x}" y="${y}" width="${barW}" height="${Math.max(0,h)}" fill="${fillCol}"${dotted}/>
      ${h > 6 ? `<text x="${x + barW/2}" y="${labelY}" text-anchor="middle" font-family="DM Mono" font-size="11" font-weight="600" fill="${labelCol}">${d.display_bcm > 0 ? fmt(d.display_bcm, 0) : '—'}</text>` : ''}
      <text x="${x + barW/2}" y="${padT + chartH + 18}" text-anchor="middle" font-family="Barlow Condensed" font-size="10.5" fill="var(--text1)">${d.dateLabel}</text>
      <text x="${x + barW/2}" y="${padT + chartH + 34}" text-anchor="middle" font-family="Barlow" font-size="10" fill="var(--text2)">${d.dow}</text>
    </g>`;
  }).join('');

  // Title
  const title = `<text x="${padL}" y="24" font-family="Barlow" font-weight="600" font-size="14" fill="var(--text0)">Daily volume — bcm</text>
                 <text x="${padL}" y="40" font-family="Barlow" font-size="11" fill="var(--text2)">${days.length} day window · target ${fmt(STATE.rar.target_bcm_per_day, 0)} bcm/day · stretch ${fmt(STATE.rar.stretch_bcm_per_day, 0)} · day-1 reduced ${(STATE.rar.day1_reduction * 100).toFixed(0)}% for safety startup</text>`;

  // Legend
  const legend = `<g transform="translate(${W - padR - 460}, 24)">
    <rect x="0" y="-10" width="14" height="14" fill="#4a8a52"/><text x="20" y="0" font-family="Barlow" font-size="11" fill="var(--text1)">On track</text>
    <rect x="80" y="-10" width="14" height="14" fill="#b04830"/><text x="100" y="0" font-family="Barlow" font-size="11" fill="var(--text1)">Off track</text>
    <line x1="170" y1="-3" x2="184" y2="-3" stroke="white" stroke-width="1.5" stroke-dasharray="4 3"/><text x="190" y="0" font-family="Barlow" font-size="11" fill="var(--text1)">Target</text>
    <line x1="240" y1="-3" x2="254" y2="-3" stroke="#e8a855" stroke-width="1.5" stroke-dasharray="2 2"/><text x="260" y="0" font-family="Barlow" font-size="11" fill="var(--text1)">Stretch</text>
    <line x1="310" y1="-3" x2="324" y2="-3" stroke="#a8c0a0" stroke-width="2.5" stroke-dasharray="5 3"/><text x="330" y="0" font-family="Barlow" font-size="11" fill="var(--text1)">Cum avg</text>
  </g>`;

  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet" style="width:100%;max-width:1000px;height:auto;display:block;margin:0 auto;">
    ${onTrackBand}${offTrackBand}
    ${yTicks.join('')}
    ${bars}
    ${targetLine}${stretchLine}${cumLine}
    ${title}${legend}
  </svg>`;
}

// Cost bar chart
function renderRarCostChart(days) {
  const W = 1000, H = 380;
  const padL = 70, padR = 30, padT = 50, padB = 70;
  const chartW = W - padL - padR;
  const chartH = H - padT - padB;
  const target = STATE.rar.target_cost_per_bcm;
  // Y range
  const maxDisplay = Math.max(...days.map(d => d.display_cost || 0), target * 1.4);
  const yMax = Math.ceil(maxDisplay / 0.5) * 0.5;
  const yRange = yMax;
  const barW = chartW / days.length * 0.65;
  const bandW = chartW / days.length;

  const yToPx = (v) => padT + chartH - (v / yRange) * chartH;

  // Bands
  const targetY = yToPx(target);
  const onTrackBand = `<rect x="${padL}" y="${targetY}" width="${chartW}" height="${padT + chartH - targetY}" fill="rgba(74,138,82,0.10)"/>`;
  const offTrackBand = `<rect x="${padL}" y="${padT}" width="${chartW}" height="${targetY - padT}" fill="rgba(176,72,48,0.12)"/>`;

  // Grid
  const yTicks = [];
  for (let v = 0; v <= yMax; v += 1.0) {
    yTicks.push(`<line x1="${padL}" y1="${yToPx(v)}" x2="${W - padR}" y2="${yToPx(v)}" stroke="var(--border)" stroke-width="0.5" stroke-dasharray="2 2"/>
                 <text x="${padL - 8}" y="${yToPx(v) + 4}" text-anchor="end" font-family="Barlow Condensed" font-size="11" fill="var(--text2)">$${v.toFixed(2)}</text>`);
  }

  // Target line (flat across all days)
  const targetLine = `<line x1="${padL}" y1="${targetY}" x2="${W - padR}" y2="${targetY}" stroke="rgba(255,255,255,0.85)" stroke-width="1.5" stroke-dasharray="4 3"/>`;

  // Cumulative cost line (running avg)
  let cumBcm = 0, cumCost = 0;
  const cumPoints = days.map((d, i) => {
    cumBcm += d.display_bcm || 0;
    cumCost += (d.display_cost || 0) * (d.display_bcm || 0);
    const cumAvg = cumBcm > 0 ? cumCost / cumBcm : 0;
    const x = padL + i * bandW + bandW / 2;
    const y = yToPx(cumAvg);
    return { x, y, val: cumAvg };
  });
  const cumPath = `M ${cumPoints.map(p => `${p.x} ${p.y}`).join(' L ')}`;
  const cumLine = `<path d="${cumPath}" fill="none" stroke="#a8c0a0" stroke-width="2" stroke-dasharray="3 2"/>
                   ${cumPoints.map(p => `<circle cx="${p.x}" cy="${p.y}" r="2.5" fill="#a8c0a0"/>`).join('')}
                   ${cumPoints.map(p => `<text x="${p.x}" y="${p.y - 8}" text-anchor="middle" font-family="Barlow" font-style="italic" font-size="10" fill="#a8c0a0">$${p.val.toFixed(2)}</text>`).join('')}`;

  // Bars
  const bars = days.map((d, i) => {
    if (d.display_cost == null || d.display_cost <= 0) {
      return `<text x="${padL + i * bandW + bandW/2}" y="${padT + chartH + 18}" text-anchor="middle" font-family="Barlow Condensed" font-size="10.5" fill="var(--text1)">${d.dateLabel}</text>
              <text x="${padL + i * bandW + bandW/2}" y="${padT + chartH + 34}" text-anchor="middle" font-family="Barlow" font-size="10" fill="var(--text2)">${d.dow}</text>`;
    }
    const x = padL + i * bandW + (bandW - barW) / 2;
    const y = yToPx(d.display_cost);
    const h = (padT + chartH) - y;
    const onTrack = d.display_cost <= target;
    const fillCol = onTrack ? '#4a8a52' : '#b04830';
    const dotted = d.is_actual ? '' : ' stroke-dasharray="3 2" stroke="rgba(255,255,255,0.4)" stroke-width="1"';
    return `<g class="rar-drill" data-rar-drill="${d.date}" style="cursor:pointer;">
      <rect x="${x - 2}" y="${padT}" width="${barW + 4}" height="${chartH}" fill="rgba(255,255,255,0.001)"/>
      <rect x="${x}" y="${y}" width="${barW}" height="${Math.max(0,h)}" fill="${fillCol}"${dotted}/>
      <text x="${x + barW/2}" y="${y + 14}" text-anchor="middle" font-family="DM Mono" font-size="11" font-weight="600" fill="white">$${d.display_cost.toFixed(2)}</text>
      <text x="${x + barW/2}" y="${padT + chartH + 18}" text-anchor="middle" font-family="Barlow Condensed" font-size="10.5" fill="var(--text1)">${d.dateLabel}</text>
      <text x="${x + barW/2}" y="${padT + chartH + 34}" text-anchor="middle" font-family="Barlow" font-size="10" fill="var(--text2)">${d.dow}</text>
    </g>`;
  }).join('');

  const title = `<text x="${padL}" y="24" font-family="Barlow" font-weight="600" font-size="14" fill="var(--text0)">Cost per bcm ($/bcm)</text>
                 <text x="${padL}" y="40" font-family="Barlow" font-size="11" fill="var(--text2)">${days.length} day window · target $${target.toFixed(2)} · cumulative running avg overlay</text>`;
  const legend = `<g transform="translate(${W - padR - 320}, 24)">
    <rect x="0" y="-10" width="14" height="14" fill="#4a8a52"/><text x="20" y="0" font-family="Barlow" font-size="11" fill="var(--text1)">On track</text>
    <rect x="80" y="-10" width="14" height="14" fill="#b04830"/><text x="100" y="0" font-family="Barlow" font-size="11" fill="var(--text1)">Off track</text>
    <line x1="170" y1="-3" x2="184" y2="-3" stroke="white" stroke-width="1.5" stroke-dasharray="4 3"/><text x="190" y="0" font-family="Barlow" font-size="11" fill="var(--text1)">Target</text>
    <line x1="240" y1="-3" x2="254" y2="-3" stroke="#a8c0a0" stroke-width="2" stroke-dasharray="3 2"/><text x="260" y="0" font-family="Barlow" font-size="11" fill="var(--text1)">Cum avg</text>
  </g>`;

  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet" style="width:100%;max-width:1000px;height:auto;display:block;margin:0 auto;">
    ${onTrackBand}${offTrackBand}
    ${yTicks.join('')}
    ${bars}
    ${targetLine}${cumLine}
    ${title}${legend}
  </svg>`;
}

// Utilisation chart — excavator + truck SMU per day
function renderRarUtilisationChart(days) {
  const W = 1000, H = 360;
  const padL = 70, padR = 30, padT = 50, padB = 70;
  const chartW = W - padL - padR;
  const chartH = H - padT - padB;
  const targetSmu = 10;  // typical Tier 1
  const yMax = 12;
  const yToPx = (v) => padT + chartH - (v / yMax) * chartH;
  const bandW = chartW / days.length;
  const barW = bandW * 0.30;

  // Background
  const targetY = yToPx(targetSmu);
  const onBand = `<rect x="${padL}" y="${targetY}" width="${chartW}" height="${padT + chartH - targetY}" fill="rgba(74,138,82,0.08)"/>`;
  const offBand = `<rect x="${padL}" y="${padT}" width="${chartW}" height="${targetY - padT}" fill="rgba(176,72,48,0.06)"/>`;

  const yTicks = [];
  for (let v = 0; v <= yMax; v += 2) {
    yTicks.push(`<line x1="${padL}" y1="${yToPx(v)}" x2="${W - padR}" y2="${yToPx(v)}" stroke="var(--border)" stroke-width="0.5" stroke-dasharray="2 2"/>
                 <text x="${padL - 8}" y="${yToPx(v) + 4}" text-anchor="end" font-family="Barlow Condensed" font-size="11" fill="var(--text2)">${v}</text>`);
  }
  const targetLine = `<line x1="${padL}" y1="${targetY}" x2="${W - padR}" y2="${targetY}" stroke="rgba(255,255,255,0.85)" stroke-width="1.5" stroke-dasharray="4 3"/>`;

  // For each day, build avg exc SMU + avg truck SMU per active op
  const bars = days.map((d, i) => {
    const dayS = STATE.sessions.filter(s => s.date === d.date);
    const excSmu = dayS.length > 0 ? dayS.reduce((s, x) => s + (x.planned_smu || 0), 0) / dayS.length : 0;
    const truckSmu = excSmu;  // simplified — same SMU drives both for a balanced fleet
    const xBase = padL + i * bandW + bandW / 2;
    const xExc = xBase - barW - 2;
    const xTrk = xBase + 2;
    const yE = yToPx(excSmu); const hE = (padT + chartH) - yE;
    const yT = yToPx(truckSmu); const hT = (padT + chartH) - yT;
    const colE = excSmu >= targetSmu ? '#c8833a' : '#d2a570';
    const colT = truckSmu >= targetSmu ? '#7a8b6a' : '#a3b591';
    const showVal = excSmu > 0;
    return `${showVal ? `<rect x="${xExc}" y="${yE}" width="${barW}" height="${Math.max(0,hE)}" fill="${colE}"/>
      <text x="${xExc + barW/2}" y="${yE - 4}" text-anchor="middle" font-family="DM Mono" font-size="10" fill="var(--text0)">${excSmu.toFixed(1)}</text>
      <rect x="${xTrk}" y="${yT}" width="${barW}" height="${Math.max(0,hT)}" fill="${colT}"/>
      <text x="${xTrk + barW/2}" y="${yT - 4}" text-anchor="middle" font-family="DM Mono" font-size="10" fill="var(--text0)">${truckSmu.toFixed(1)}</text>` : ''}
      <text x="${xBase}" y="${padT + chartH + 18}" text-anchor="middle" font-family="Barlow Condensed" font-size="10.5" fill="var(--text1)">${d.dateLabel}</text>
      <text x="${xBase}" y="${padT + chartH + 34}" text-anchor="middle" font-family="Barlow" font-size="10" fill="var(--text2)">${d.dow}</text>`;
  }).join('');

  const title = `<text x="${padL}" y="24" font-family="Barlow" font-weight="600" font-size="14" fill="var(--text0)">SMU utilisation per shift</text>
                 <text x="${padL}" y="40" font-family="Barlow" font-size="11" fill="var(--text2)">Excavator + truck average SMU per active operation · target ${targetSmu} SMU</text>`;
  const legend = `<g transform="translate(${W - padR - 240}, 24)">
    <rect x="0" y="-10" width="14" height="14" fill="#c8833a"/><text x="20" y="0" font-family="Barlow" font-size="11" fill="var(--text1)">Excavator</text>
    <rect x="80" y="-10" width="14" height="14" fill="#7a8b6a"/><text x="100" y="0" font-family="Barlow" font-size="11" fill="var(--text1)">Trucks</text>
    <line x1="160" y1="-3" x2="174" y2="-3" stroke="white" stroke-width="1.5" stroke-dasharray="4 3"/><text x="180" y="0" font-family="Barlow" font-size="11" fill="var(--text1)">Target ${targetSmu}</text>
  </g>`;

  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet" style="width:100%;max-width:1000px;height:auto;display:block;margin:0 auto;">
    ${onBand}${offBand}
    ${yTicks.join('')}
    ${bars}
    ${targetLine}
    ${title}${legend}
  </svg>`;
}

function renderRarConfigBar(days) {
  ensureRarState();
  const cfg = STATE.rar;
  // Sum totals
  const tot_actual = days.reduce((s, d) => s + (d.actual_bcm || 0), 0);
  const tot_planned = days.reduce((s, d) => s + (d.planned_bcm || 0), 0);
  const tot_target = days.reduce((s, d) => s + d.target_bcm, 0);
  const tot_actual_cost = days.reduce((s, d) => s + (d.actual_cost_per_bcm || 0) * (d.actual_bcm || 0), 0);
  const tot_actual_bcm_for_cost = days.reduce((s, d) => s + (d.actual_bcm || 0), 0);
  const wAvgCost = tot_actual_bcm_for_cost > 0 ? tot_actual_cost / tot_actual_bcm_for_cost : null;
  const vsTarget = tot_target > 0 ? ((tot_actual || tot_planned) / tot_target - 1) * 100 : 0;

  return `<div class="card" style="margin-bottom:16px;">
    <div class="card-header">
      <span class="card-title">RAR — ${cfg.period_days}-day snapshot</span>
      <span class="card-subtitle">period ending ${cfg.period_end}</span>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;align-items:start;">
      <div>
        <label style="display:block;font-family:'Barlow Condensed';text-transform:uppercase;letter-spacing:0.10em;font-size:11px;color:var(--text2);margin-bottom:4px;">Period end</label>
        <input type="date" id="rar-end" value="${cfg.period_end}" style="width:100%;padding:8px;background:var(--bg1);border:1px solid var(--border);color:var(--text0);font-family:'DM Mono';border-radius:3px;"/>
      </div>
      <div>
        <label style="display:block;font-family:'Barlow Condensed';text-transform:uppercase;letter-spacing:0.10em;font-size:11px;color:var(--text2);margin-bottom:4px;">Period days</label>
        <select id="rar-days" style="width:100%;padding:8px;background:var(--bg1);border:1px solid var(--border);color:var(--text0);font-family:'Barlow';border-radius:3px;">
          <option value="8" ${cfg.period_days === 8 ? 'selected' : ''}>8 (8:6 roster)</option>
          <option value="14" ${cfg.period_days === 14 ? 'selected' : ''}>14 (7:7 continuous)</option>
          <option value="7" ${cfg.period_days === 7 ? 'selected' : ''}>7</option>
          <option value="30" ${cfg.period_days === 30 ? 'selected' : ''}>30</option>
        </select>
      </div>
      <div>
        <label style="display:block;font-family:'Barlow Condensed';text-transform:uppercase;letter-spacing:0.10em;font-size:11px;color:var(--text2);margin-bottom:4px;">Volume target (bcm/day)</label>
        <input type="number" id="rar-target-bcm" value="${cfg.target_bcm_per_day}" step="100" style="width:100%;padding:8px;background:var(--bg1);border:1px solid var(--border);color:var(--text0);font-family:'DM Mono';border-radius:3px;"/>
      </div>
      <div>
        <label style="display:block;font-family:'Barlow Condensed';text-transform:uppercase;letter-spacing:0.10em;font-size:11px;color:var(--text2);margin-bottom:4px;">Volume stretch (bcm/day)</label>
        <input type="number" id="rar-stretch-bcm" value="${cfg.stretch_bcm_per_day}" step="100" style="width:100%;padding:8px;background:var(--bg1);border:1px solid var(--border);color:var(--text0);font-family:'DM Mono';border-radius:3px;"/>
      </div>
      <div>
        <label style="display:block;font-family:'Barlow Condensed';text-transform:uppercase;letter-spacing:0.10em;font-size:11px;color:var(--text2);margin-bottom:4px;">Cost target ($/bcm)</label>
        <input type="number" id="rar-target-cost" value="${cfg.target_cost_per_bcm}" step="0.05" style="width:100%;padding:8px;background:var(--bg1);border:1px solid var(--border);color:var(--text0);font-family:'DM Mono';border-radius:3px;"/>
      </div>
      <div>
        <label style="display:block;font-family:'Barlow Condensed';text-transform:uppercase;letter-spacing:0.10em;font-size:11px;color:var(--text2);margin-bottom:4px;">Day-1 reduction (UT startup)</label>
        <input type="number" id="rar-day1" value="${(cfg.day1_reduction * 100).toFixed(0)}" step="1" style="width:100%;padding:8px;background:var(--bg1);border:1px solid var(--border);color:var(--text0);font-family:'DM Mono';border-radius:3px;"/>
        <span style="font-family:'Barlow';color:var(--text2);font-size:10px;">% of daily target reduced day 1</span>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-top:14px;border-top:1px solid var(--border);padding-top:12px;">
      <div><div style="font-family:'Barlow Condensed';text-transform:uppercase;letter-spacing:0.10em;font-size:10px;color:var(--text2);">Period total</div><div style="font-family:'DM Mono';font-size:18px;color:var(--text0);font-weight:600;">${fmt(tot_actual || tot_planned, 0)} bcm</div><div style="font-family:'Barlow';font-size:11px;color:${vsTarget >= 0 ? 'var(--green)' : 'var(--red)'};">${vsTarget >= 0 ? '+' : ''}${vsTarget.toFixed(1)}% vs target</div></div>
      <div><div style="font-family:'Barlow Condensed';text-transform:uppercase;letter-spacing:0.10em;font-size:10px;color:var(--text2);">Period target</div><div style="font-family:'DM Mono';font-size:18px;color:var(--text0);font-weight:600;">${fmt(tot_target, 0)} bcm</div></div>
      <div><div style="font-family:'Barlow Condensed';text-transform:uppercase;letter-spacing:0.10em;font-size:10px;color:var(--text2);">Weighted avg cost</div><div style="font-family:'DM Mono';font-size:18px;color:var(--text0);font-weight:600;">${wAvgCost != null ? '$' + wAvgCost.toFixed(2) : '—'}</div><div style="font-family:'Barlow';font-size:11px;color:var(--text2);">vs $${cfg.target_cost_per_bcm.toFixed(2)} target</div></div>
      <div><div style="font-family:'Barlow Condensed';text-transform:uppercase;letter-spacing:0.10em;font-size:10px;color:var(--text2);">Days with actuals</div><div style="font-family:'DM Mono';font-size:18px;color:var(--text0);font-weight:600;">${days.filter(d => d.is_actual).length} / ${days.length}</div><div style="font-family:'Barlow';font-size:11px;color:var(--text2);">dotted bars = predicted only</div></div>
    </div>
  </div>`;
}

function renderRARView() {
  ensureRarState();
  const days = buildRarDays();
  const html = `${renderRarConfigBar(days)}
    <div class="card"><div class="card-header"><span class="card-title">Daily volume</span><span class="card-subtitle">bcm per shift</span></div>${renderRarVolumeChart(days)}</div>
    <div class="card"><div class="card-header"><span class="card-title">Daily cost</span><span class="card-subtitle">$/bcm</span></div>${renderRarCostChart(days)}</div>
    <div class="card"><div class="card-header"><span class="card-title">SMU utilisation</span><span class="card-subtitle">excavator + truck avg per shift</span></div>${renderRarUtilisationChart(days)}</div>`;
  document.getElementById('container').innerHTML = html;
  // Wire config inputs
  const wire = (id, fn) => { const el = document.getElementById(id); if (el) el.addEventListener('input', () => { fn(el); STATE.tab = 'rar'; render(); }); };
  wire('rar-end',         el => STATE.rar.period_end = el.value);
  wire('rar-days',        el => STATE.rar.period_days = parseInt(el.value) || 8);
  wire('rar-target-bcm',  el => STATE.rar.target_bcm_per_day = parseFloat(el.value) || 0);
  wire('rar-stretch-bcm', el => STATE.rar.stretch_bcm_per_day = parseFloat(el.value) || 0);
  wire('rar-target-cost', el => STATE.rar.target_cost_per_bcm = parseFloat(el.value) || 0);
  wire('rar-day1',        el => STATE.rar.day1_reduction = (parseFloat(el.value) || 0) / 100);
}


function render() {
  const c = document.getElementById('container');
  // Always show view tabs so the user sees the app structure
  const tabsHtml = `<div class="view-tabs">
    <div class="view-tab ${STATE.view === 'day' ? 'active' : ''}" data-view="day">Day View</div>
    <div class="view-tab ${STATE.view === 'trends' ? 'active' : ''}" data-view="trends">Trends</div>
    <div class="view-tab ${STATE.view === 'report' ? 'active' : ''}" data-view="report">HELP Report</div>
    <div class="view-tab ${STATE.view === 'rar' ? 'active' : ''}" data-view="rar">RAR</div>
  </div>`;
  if (STATE.sessions.length === 0) {
    c.innerHTML = tabsHtml + `
      <div class="empty-state">
        <h2>No sessions loaded</h2>
        <p>Pit Boss reads sessions saved from the Production Superintendent app. Either click <strong>Load Sessions CSV</strong> in the header and pick the export file from Supe, or click <strong>Browser Storage</strong> if you've used Supe in this same browser session.</p>
        <p style="margin-top:14px;color:var(--text2);">After loading plans, optionally click <strong>Load Tracker</strong> to upload a CSV of actuals (date · cost_code · actual_bcm · actual_cost · hours_worked · notes) — Pit Boss matches on date+cost_code and shows plan vs actual variance per operation.</p>
        <p style="margin-top:14px;color:var(--text2);font-size:11px;">CSV import is the more reliable path — works across browsers and machines. Browser storage only works when Supe and Pit Boss are opened from the same browser with the same file:// origin.</p>
      </div>`;
    bindViewTabs();
    return;
  }

  const sessions = filtered();
  const rollup = pitRollup(sessions);
  const opps = reallocationOpportunities(sessions);

  // Date filter — derive list of available dates
  const allDates = [...new Set(STATE.sessions.map(s => s.date).filter(Boolean))].sort();
  const dateOptions = ['<option value="">All dates</option>', ...allDates.map(d => `<option value="${d}" ${d === STATE.filter_date ? 'selected' : ''}>${d}</option>`)].join('');

  // View tabs (v0.3 adds Trends)
  let html = `<div class="view-tabs">
    <div class="view-tab ${STATE.view === 'day' ? 'active' : ''}" data-view="day">Day View</div>
    <div class="view-tab ${STATE.view === 'trends' ? 'active' : ''}" data-view="trends">Trends</div>
    <div class="view-tab ${STATE.view === 'report' ? 'active' : ''}" data-view="report">HELP Report</div>
    <div class="view-tab ${STATE.view === 'rar' ? 'active' : ''}" data-view="rar">RAR</div>
  </div>`;

  // v1.9.1 — RAR view (8-day snapshot)
  if (STATE.view === 'rar') {
    c.innerHTML = `<div class="view-tabs">
      <div class="view-tab ${STATE.view === 'day' ? 'active' : ''}" data-view="day">Day View</div>
      <div class="view-tab ${STATE.view === 'trends' ? 'active' : ''}" data-view="trends">Trends</div>
      <div class="view-tab ${STATE.view === 'report' ? 'active' : ''}" data-view="report">HELP Report</div>
      <div class="view-tab active" data-view="rar">RAR</div>
    </div>` + '<div id="rar-host"></div>';
    bindViewTabs();
    // Append RAR content into rar-host
    const host = document.getElementById('rar-host');
    if (host) {
      // Reuse renderRARView but redirect output into rar-host
      const days = buildRarDays();
      const insights = buildRarInsights(days);
      host.innerHTML = renderRarConfigBar(days) +
        renderRarSoWhatCard(insights) +
        '<div class="card"><div class="card-header"><span class="card-title">Daily volume</span><span class="card-subtitle">bcm per shift</span></div>' + renderRarVolumeChart(days) + '</div>' +
        '<div class="card"><div class="card-header"><span class="card-title">Daily cost</span><span class="card-subtitle">$/bcm</span></div>' + renderRarCostChart(days) + '</div>' +
        '<div class="card"><div class="card-header"><span class="card-title">SMU utilisation</span><span class="card-subtitle">excavator + truck avg per shift</span></div>' + renderRarUtilisationChart(days) + '</div>';
      // Wire config inputs
      const wire = (id, fn) => { const el = document.getElementById(id); if (el) el.addEventListener('input', () => { fn(el); render(); }); };
      wire('rar-end',         el => STATE.rar.period_end = el.value);
      wire('rar-days',        el => STATE.rar.period_days = parseInt(el.value) || 8);
      wire('rar-target-bcm',  el => STATE.rar.target_bcm_per_day = parseFloat(el.value) || 0);
      wire('rar-stretch-bcm', el => STATE.rar.stretch_bcm_per_day = parseFloat(el.value) || 0);
      wire('rar-target-cost', el => STATE.rar.target_cost_per_bcm = parseFloat(el.value) || 0);
      wire('rar-day1',        el => STATE.rar.day1_reduction = (parseFloat(el.value) || 0) / 100);
      // v1.9.3 — Click any daily bar to drill into Day View for that date
      document.querySelectorAll('.rar-drill').forEach(el => {
        el.addEventListener('click', () => {
          const drillDate = el.dataset.rarDrill;
          if (!drillDate) return;
          STATE.filter_date = drillDate;
          STATE.view = 'day';
          const dateEl = document.getElementById('filter-date');
          if (dateEl) dateEl.value = drillDate;
          render();
          toast(`Showing ${drillDate} in Day View`);
        });
      });
    }
    return;
  }

  // Trends view (v0.3)
  if (STATE.view === 'trends') {
    html += renderTrendsView();
    c.innerHTML = html;
    bindViewTabs();
    // Render charts after DOM is in place
    setTimeout(() => drawTrendsCharts(), 50);
    return;
  }

  // HELP Report view — v2.2 reconciliation with privacy filtering
  if (STATE.view === 'report') {
    pbEnsureViewer();
    const help = buildHelpReportFiltered(STATE.sessions);
    html += renderHelpViewerSelector();
    html += `<div class="section">
      <div class="section-title">
        Period summary <span class="section-sub">${help.n_sessions} sessions${help.n_actuals > 0 ? ' · ' + help.n_actuals + ' actuals reconciled' : ' · no actuals loaded'}</span>
        <span style="margin-left:auto;display:flex;gap:8px;">
          <button id="btn-report-md" class="ghost" style="padding:6px 12px;background:var(--bg2);border:1px solid var(--border);">Export Markdown</button>
          <button id="btn-report-print" class="primary" style="padding:6px 12px;">Print / Save as PDF</button>
        </span>
      </div>
      <div class="help-grid">
        <div class="help-card h">
          <div class="help-card-title">Highlights <span class="help-card-sub">${help.H.length}</span></div>
          ${help.H.length > 0 ? `<ul class="help-list">${help.H.map(x => `<li>${x}</li>`).join('')}</ul>` : '<div class="help-empty">No standout positives surfaced yet — load more sessions or wait for actuals to reconcile.</div>'}
        </div>
        <div class="help-card l">
          <div class="help-card-title">Lowlights <span class="help-card-sub">${help.L.length}</span></div>
          ${help.L.length > 0 ? `<ul class="help-list">${help.L.map(x => `<li>${x}</li>`).join('')}</ul>` : '<div class="help-empty">No material underperformance flagged.</div>'}
        </div>
        <div class="help-card e">
          <div class="help-card-title">Emerging issues <span class="help-card-sub">${help.E.length}</span></div>
          ${help.E.length > 0 ? `<ul class="help-list">${help.E.map(x => `<li>${x}</li>`).join('')}</ul>` : '<div class="help-empty">No recurring patterns yet — keep capturing.</div>'}
        </div>
        <div class="help-card p">
          <div class="help-card-title">Priorities <span class="help-card-sub">${help.P.length}</span></div>
          ${help.P.length > 0 ? `<ul class="help-list">${help.P.map(x => `<li>${x}</li>`).join('')}</ul>` : '<div class="help-empty">No urgent reallocation or rebalancing required.</div>'}
        </div>
      </div>
      <div class="help-card help" style="margin-top:14px;">
        <div class="help-card-title">How leadership can help <span class="help-card-sub">${help.HELP.length} ask${help.HELP.length === 1 ? '' : 's'}</span></div>
        ${help.HELP.length > 0 ? `<ul class="help-list">${help.HELP.map(x => `<li>${x}</li>`).join('')}</ul>` : '<div class="help-empty">No specific asks — operations self-sufficient at current scale.</div>'}
      </div>
    </div>
    <div style="color:var(--text2);font-size:11px;text-align:center;margin-top:18px;font-family:'Barlow Condensed';text-transform:uppercase;letter-spacing:0.08em;">
      HELP report runs over all loaded data, not the date filter · ${STATE.sessions.length} session${STATE.sessions.length > 1 ? 's' : ''}${help.n_actuals > 0 ? ' · ' + help.n_actuals + ' actuals' : ''}
    </div>`;
    c.innerHTML = html;
    bindViewTabs(); wireHelpViewerControls();
    // v0.3 — wire up report export buttons
    document.getElementById('btn-report-md')?.addEventListener('click', () => exportHelpReportMD(help));
    document.getElementById('btn-report-print')?.addEventListener('click', () => printHelpReport(help));
    return;
  }

  if (!rollup) {
    html = `
      <div class="empty-state">
        <h2>No sessions for ${STATE.filter_date || 'this filter'}</h2>
        <p>Try selecting a different date or clearing the date filter.</p>
      </div>`;
    c.innerHTML = html;
    return;
  }

  // Overview tiles
  html += `<div class="overview">
    <div class="ov-tile">
      <div class="ov-label">Total production</div>
      <div class="ov-value">${fmt(rollup.total_bcm, 0)}</div>
      <div class="ov-detail">bcm planned · ${rollup.n} active op${rollup.n > 1 ? 's' : ''}</div>
    </div>
    <div class="ov-tile">
      <div class="ov-label">Weighted unit cost</div>
      <div class="ov-value">${fmtMoney(rollup.weighted_cost_per_bcm, 2)}</div>
      <div class="ov-detail">per bcm · fully loaded</div>
    </div>
    <div class="ov-tile">
      <div class="ov-label">Total shift cost</div>
      <div class="ov-value">${fmtMoney(rollup.total_cost, 0)}</div>
      <div class="ov-detail">across all active ops</div>
    </div>
    <div class="ov-tile">
      <div class="ov-label">Excavators on shift</div>
      <div class="ov-value">${rollup.exc_count}</div>
      <div class="ov-detail">${Object.entries(rollup.fleet_by_exc).map(([k,v])=>`${v}×${k}`).join(' · ')}</div>
    </div>
    <div class="ov-tile">
      <div class="ov-label">Trucks committed</div>
      <div class="ov-value">${rollup.total_truck_count}</div>
      <div class="ov-detail">${Object.entries(rollup.fleet_by_truck).map(([k,v])=>`${v}×${k}`).join(' · ')}</div>
    </div>
    <div class="ov-tile">
      <div class="ov-label">Diesel burn</div>
      <div class="ov-value">${fmt(rollup.total_fuel_L, 0)}</div>
      <div class="ov-detail">L · ${fmt(rollup.total_smu, 0)} SMU planned</div>
    </div>
  </div>`;

  // Bottleneck distribution
  const bc = rollup.bottleneck_counts;
  const bcTotal = bc.balanced + bc.dig + bc.truck + bc.dump;
  if (bcTotal > 0) {
    html += `<div class="section">
      <div class="section-title">Bottleneck distribution <span class="section-sub">${bcTotal} operations</span></div>
      <div class="dist-bar">
        ${bc.balanced > 0 ? `<div class="dist-seg dist-balanced" style="width:${(bc.balanced/bcTotal)*100}%">${bc.balanced > 0 ? bc.balanced : ''}</div>` : ''}
        ${bc.dig > 0 ? `<div class="dist-seg dist-dig" style="width:${(bc.dig/bcTotal)*100}%">${bc.dig}</div>` : ''}
        ${bc.truck > 0 ? `<div class="dist-seg dist-truck" style="width:${(bc.truck/bcTotal)*100}%">${bc.truck}</div>` : ''}
        ${bc.dump > 0 ? `<div class="dist-seg dist-dump" style="width:${(bc.dump/bcTotal)*100}%">${bc.dump}</div>` : ''}
      </div>
      <div class="dist-legend">
        <div class="item"><span class="swatch" style="background:var(--green);"></span> Balanced (${bc.balanced})</div>
        <div class="item"><span class="swatch" style="background:var(--ochre);"></span> Dig-constrained (${bc.dig})</div>
        <div class="item"><span class="swatch" style="background:var(--red);"></span> Truck-constrained (${bc.truck})</div>
        <div class="item"><span class="swatch" style="background:var(--copper);"></span> Dump-constrained (${bc.dump})</div>
      </div>
    </div>`;
  }

  // Reallocation opportunities
  if (opps.length > 0) {
    html += `<div class="section">
      <div class="section-title">Fleet reallocation opportunities <span class="section-sub">${opps.length} candidate move${opps.length > 1 ? 's' : ''}</span></div>
      ${opps.slice(0, 4).map(o => `<div class="alert-box">
        <div class="alert-title">→ Move ${o.truck_count} truck${o.truck_count > 1 ? 's' : ''} from ${o.from.cost_code} → ${o.to.cost_code}${o.sameClass ? '' : ' (cross-class)'}</div>
        <div class="alert-text">${o.rationale}</div>
      </div>`).join('')}
    </div>`;
  }

  // Plan vs Actual roll-up if actuals loaded
  const hasActuals = STATE.actuals.length > 0;
  let pvaSummary = null;
  if (hasActuals) {
    let p_bcm = 0, a_bcm = 0, p_cost = 0, a_cost = 0, matched = 0, unmatched = 0;
    sessions.forEach(s => {
      const act = findActualFor(s);
      p_bcm += s.production_bcm || 0;
      p_cost += s.total_cost || 0;
      if (act) {
        matched++;
        a_bcm += act.actual_bcm || 0;
        a_cost += act.actual_cost || 0;
      } else { unmatched++; }
    });
    const bcm_delta = a_bcm - p_bcm;
    const cost_delta = a_cost - p_cost;
    const p_unit = p_bcm > 0 ? p_cost / p_bcm : 0;
    const a_unit = a_bcm > 0 ? a_cost / a_bcm : 0;
    pvaSummary = { p_bcm, a_bcm, bcm_delta, p_cost, a_cost, cost_delta, p_unit, a_unit, matched, unmatched };

    html += `<div class="section">
      <div class="section-title">Plan vs Actual <span class="section-sub">${matched}/${matched + unmatched} ops matched · ${STATE.actuals.length} actuals loaded</span></div>
      <div class="fleet-grid">
        <div class="fleet-cell" style="border-left-color:${bcm_delta >= 0 ? 'var(--green)' : 'var(--red)'};">
          <div class="fc-label">Production · plan vs actual</div>
          <div class="fc-value">${fmt(a_bcm, 0)} <span style="color:var(--text2);font-size:12px;">/ ${fmt(p_bcm, 0)} plan</span></div>
          <div class="fc-detail" style="color:${bcm_delta >= 0 ? 'var(--green)' : 'var(--red)'};">${bcm_delta >= 0 ? '+' : ''}${fmt(bcm_delta, 0)} bcm (${p_bcm > 0 ? ((bcm_delta/p_bcm)*100).toFixed(1) + '%' : '—'})</div>
        </div>
        <div class="fleet-cell" style="border-left-color:${cost_delta <= 0 ? 'var(--green)' : 'var(--red)'};">
          <div class="fc-label">Cost · plan vs actual</div>
          <div class="fc-value">${fmtMoney(a_cost, 0)} <span style="color:var(--text2);font-size:12px;">/ ${fmtMoney(p_cost, 0)} plan</span></div>
          <div class="fc-detail" style="color:${cost_delta <= 0 ? 'var(--green)' : 'var(--red)'};">${cost_delta >= 0 ? '+' : ''}${fmtMoney(cost_delta, 0)} (${p_cost > 0 ? ((cost_delta/p_cost)*100).toFixed(1) + '%' : '—'})</div>
        </div>
        <div class="fleet-cell">
          <div class="fc-label">Unit cost · plan vs actual</div>
          <div class="fc-value">${fmtMoney(a_unit, 2)} <span style="color:var(--text2);font-size:12px;">/ ${fmtMoney(p_unit, 2)} plan</span></div>
          <div class="fc-detail">${(a_unit - p_unit) >= 0 ? '+' : ''}${fmtMoney(a_unit - p_unit, 2)} / bcm</div>
        </div>
      </div>
    </div>`;
  }

  // Operations table
  html += `<div class="section">
    <div class="section-title">Active operations <span class="section-sub">${sessions.length} on shift${hasActuals ? ' · actuals matched where available' : ''}</span></div>
    <table class="ops-table">
      <thead>
        <tr>
          <th>Cost code</th>
          <th>Fleet</th>
          <th>Material</th>
          <th style="text-align:right;">Production (plan ${hasActuals ? '/ actual' : ''})</th>
          <th style="text-align:right;">$ / bcm</th>
          <th>Bottleneck</th>
          <th>Match</th>
          <th style="text-align:right;">Cycle</th>
          <th style="text-align:right;">Loads / truck</th>
        </tr>
      </thead>
      <tbody>
        ${sessions.map(s => {
          const mfClass = !s.match_factor ? '' :
            s.match_factor < 0.95 ? 'alert' :
            s.match_factor > 1.05 ? 'warn' : 'ok';
          const mfPct = Math.min(1.5, s.match_factor) / 1.5 * 100;
          const act = hasActuals ? findActualFor(s) : null;
          const bcm_var = act && s.production_bcm ? (act.actual_bcm - s.production_bcm) / s.production_bcm : null;
          const bcm_var_color = bcm_var === null ? 'var(--text2)' : bcm_var >= 0 ? 'var(--green)' : 'var(--red)';
          return `<tr>
            <td class="label-cell"><strong>${s.cost_code || '—'}</strong><br><span style="color:var(--text2);font-size:11px;">${s.activity || ''} · ${s.shift || ''}${act ? ' · <span style="color:var(--copperLight);">matched</span>' : (hasActuals ? ' · <span style="color:var(--ochre);">no actual</span>' : '')}</span></td>
            <td>${s.excavator || '—'}<br><span style="color:var(--text2);">${s.truck_count}×${s.truck_class || '—'}</span></td>
            <td class="label-cell" style="color:var(--text1);">${s.material || '—'}</td>
            <td style="text-align:right;">
              ${fmt(s.production_bcm, 0)}${act ? ` <span style="color:${bcm_var_color};">/ ${fmt(act.actual_bcm, 0)}</span>` : ''}
              <br><span style="color:var(--text2);font-size:11px;">${fmt(s.bcm_per_smu, 0)} bcm/SMU plan${bcm_var !== null ? ` · <span style="color:${bcm_var_color};">${bcm_var >= 0 ? '+' : ''}${(bcm_var*100).toFixed(1)}%</span>` : ''}</span>
            </td>
            <td style="text-align:right;" class="cost">${fmtMoney(s.cost_per_bcm, 2)}<br><span style="color:var(--text2);font-family:'Barlow';font-size:11px;">${fmtMoney(s.total_cost, 0)}${act && act.actual_cost ? ' / ' + fmtMoney(act.actual_cost, 0) : ''}</span></td>
            <td><span class="bottleneck-chip ${bottleneckClass(s.bottleneck)}">${bottleneckLabel(s.bottleneck)}</span></td>
            <td>${(s.match_factor || 0).toFixed(2)} <span class="match-bar"><span class="match-fill ${mfClass}" style="width:${mfPct}%"></span></span></td>
            <td style="text-align:right;color:var(--text1);">${s.payload_bcm ? s.payload_bcm.toFixed(1) + ' bcm' : '—'}<br><span style="color:var(--text2);font-size:11px;">${s.passes || '—'} passes</span></td>
            <td style="text-align:right;">${s.loads_per_truck ? s.loads_per_truck.toFixed(0) : '—'}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
    ${hasActuals ? `<div class="help-block" style="margin-top:10px;font-size:11px;color:var(--text2);font-family:'Barlow',sans-serif;">Matched on (date, cost_code) — fuzzy match on whitespace/case. Unmatched plans (no actual) shown but excluded from variance roll-up. Unmatched actuals (no plan) listed separately below.</div>` : ''}
  </div>`;

  // Show orphan actuals if any (actuals with no matching plan)
  if (hasActuals) {
    const dateFiltered = STATE.filter_date ? STATE.actuals.filter(a => a.date === STATE.filter_date) : STATE.actuals;
    const orphans = dateFiltered.filter(a => !sessions.find(s => findActualFor(s) === a));
    if (orphans.length > 0) {
      html += `<div class="section">
        <div class="section-title">Unmatched actuals <span class="section-sub">${orphans.length} actual${orphans.length === 1 ? '' : 's'} with no plan</span></div>
        <table class="ops-table">
          <thead><tr><th>Date</th><th>Cost code</th><th style="text-align:right;">Actual bcm</th><th style="text-align:right;">Actual cost</th><th style="text-align:right;">Hours</th><th>Notes</th></tr></thead>
          <tbody>
            ${orphans.map(a => `<tr>
              <td>${a.date}</td>
              <td class="label-cell">${a.cost_code}</td>
              <td style="text-align:right;">${fmt(a.actual_bcm, 0)}</td>
              <td style="text-align:right;" class="cost">${a.actual_cost ? fmtMoney(a.actual_cost, 0) : '—'}</td>
              <td style="text-align:right;">${a.hours_worked || '—'}</td>
              <td style="font-family:'Barlow',sans-serif;color:var(--text2);font-size:11px;">${a.notes || ''}</td>
            </tr>`).join('')}
          </tbody>
        </table>
        <div class="help-block" style="margin-top:10px;color:var(--text2);">These activities happened but weren't planned in Production Supe. Either backfill the plan (for moat completeness) or accept as unplanned work.</div>
      </div>`;
    }
  }

  // Cost decomposition (pit-wide)
  let totalPrimary = 0, totalAnc = 0, totalLab = 0, totalFuel = 0;
  sessions.forEach(s => {
    totalPrimary += s.cost_primary || 0;
    totalAnc += s.cost_ancillaries || 0;
    totalLab += s.cost_labour || 0;
    totalFuel += s.cost_fuel || 0;
  });
  const totalAll = totalPrimary + totalAnc + totalLab + totalFuel;
  if (totalAll > 0) {
    html += `<div class="section">
      <div class="section-title">Cost decomposition — pit-wide <span class="section-sub">${fmtMoney(totalAll, 0)} total</span></div>
      <div class="fleet-grid">
        <div class="fleet-cell"><div class="fc-label">Primary fleet</div><div class="fc-value">${fmtMoney(totalPrimary, 0)}</div><div class="fc-detail">${totalAll > 0 ? (totalPrimary/totalAll*100).toFixed(0) : 0}% of total</div></div>
        <div class="fleet-cell"><div class="fc-label">Ancillaries</div><div class="fc-value">${fmtMoney(totalAnc, 0)}</div><div class="fc-detail">${totalAll > 0 ? (totalAnc/totalAll*100).toFixed(0) : 0}%</div></div>
        <div class="fleet-cell"><div class="fc-label">Operator labour</div><div class="fc-value">${fmtMoney(totalLab, 0)}</div><div class="fc-detail">${totalAll > 0 ? (totalLab/totalAll*100).toFixed(0) : 0}%</div></div>
        <div class="fleet-cell"><div class="fc-label">Fuel</div><div class="fc-value">${fmtMoney(totalFuel, 0)}</div><div class="fc-detail">${totalAll > 0 ? (totalFuel/totalAll*100).toFixed(0) : 0}% · ${fmt(rollup.total_fuel_L, 0)} L</div></div>
      </div>
    </div>`;
  }

  // Source / metadata
  html += `<div style="color:var(--text2);font-size:11px;text-align:center;margin-top:18px;font-family:'Barlow Condensed';text-transform:uppercase;letter-spacing:0.08em;">
    Source: ${STATE.source || 'unknown'} · ${STATE.sessions.length} session${STATE.sessions.length > 1 ? 's' : ''} loaded${hasActuals ? ' · ' + STATE.actuals.length + ' actuals' : ''} · Filter: ${STATE.filter_date || 'all dates'}
  </div>`;

  c.innerHTML = html;
  bindViewTabs();
}

// v0.3 — Trends view: multi-day charts + contractor rollup
function renderTrendsView() {
  const dates = [...new Set(STATE.sessions.map(s => s.date).filter(Boolean))].sort();
  if (dates.length === 0) {
    return `<div class="empty-state"><h2>No date data</h2><p>Load sessions to see trends.</p></div>`;
  }
  // Build daily aggregates
  const daily = dates.map(d => {
    const ds = STATE.sessions.filter(s => s.date === d);
    let bcm = 0, cost = 0, fuel_L = 0;
    let bc = { balanced: 0, dig: 0, truck: 0, dump: 0 };
    ds.forEach(s => {
      bcm += s.production_bcm || 0;
      cost += s.total_cost || 0;
      fuel_L += s.fuel_L || 0;
      if (s.bottleneck && bc[s.bottleneck] !== undefined) bc[s.bottleneck]++;
    });
    // Match actuals
    let actual_bcm = 0, actual_cost = 0, matched = 0;
    if (STATE.actuals.length > 0) {
      ds.forEach(s => {
        const a = findActualFor(s);
        if (a) { matched++; actual_bcm += a.actual_bcm || 0; actual_cost += a.actual_cost || 0; }
      });
    }
    return {
      date: d, n_ops: ds.length, bcm, cost, fuel_L,
      unit_cost: bcm > 0 ? cost / bcm : 0,
      bc,
      actual_bcm, actual_cost, matched,
      actual_unit: actual_bcm > 0 ? actual_cost / actual_bcm : 0
    };
  });
  // Contractor rollup — defaults to "SEM Civil" or extracts from cost_code prefix if present
  const byContractor = {};
  STATE.sessions.forEach(s => {
    const c = s.contractor || extractContractorFromCode(s.cost_code) || "SEM Civil";
    if (!byContractor[c]) byContractor[c] = { ops: 0, bcm: 0, cost: 0, sessions: [] };
    byContractor[c].ops++;
    byContractor[c].bcm += s.production_bcm || 0;
    byContractor[c].cost += s.total_cost || 0;
    byContractor[c].sessions.push(s);
  });
  const contractors = Object.entries(byContractor).map(([name, x]) => ({
    name, ...x, unit_cost: x.bcm > 0 ? x.cost / x.bcm : 0
  })).sort((a, b) => b.bcm - a.bcm);

  return `
    <div class="section">
      <div class="section-title">Daily trends <span class="section-sub">${dates.length} day${dates.length === 1 ? '' : 's'} · ${STATE.sessions.length} sessions${STATE.actuals.length > 0 ? ' · ' + STATE.actuals.length + ' actuals' : ''}</span></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
        <div style="background:var(--bg2);padding:14px;border:1px solid var(--border);border-left:3px solid var(--copper);border-radius:0 4px 4px 0;">
          <div style="font-family:'Barlow Condensed';text-transform:uppercase;letter-spacing:0.08em;font-size:11px;color:var(--text2);margin-bottom:8px;">Unit cost over time ($/bcm)</div>
          <div style="position:relative;height:220px;"><canvas id="chart-cost"></canvas></div>
        </div>
        <div style="background:var(--bg2);padding:14px;border:1px solid var(--border);border-left:3px solid var(--copper);border-radius:0 4px 4px 0;">
          <div style="font-family:'Barlow Condensed';text-transform:uppercase;letter-spacing:0.08em;font-size:11px;color:var(--text2);margin-bottom:8px;">Production over time (bcm/shift)</div>
          <div style="position:relative;height:220px;"><canvas id="chart-bcm"></canvas></div>
        </div>
        <div style="background:var(--bg2);padding:14px;border:1px solid var(--border);border-left:3px solid var(--copper);border-radius:0 4px 4px 0;">
          <div style="font-family:'Barlow Condensed';text-transform:uppercase;letter-spacing:0.08em;font-size:11px;color:var(--text2);margin-bottom:8px;">Bottleneck distribution over time</div>
          <div style="position:relative;height:220px;"><canvas id="chart-bottleneck"></canvas></div>
        </div>
        <div style="background:var(--bg2);padding:14px;border:1px solid var(--border);border-left:3px solid var(--copper);border-radius:0 4px 4px 0;">
          <div style="font-family:'Barlow Condensed';text-transform:uppercase;letter-spacing:0.08em;font-size:11px;color:var(--text2);margin-bottom:8px;">Diesel burn over time (L/shift)</div>
          <div style="position:relative;height:220px;"><canvas id="chart-fuel"></canvas></div>
        </div>
      </div>
    </div>
    <div class="section">
      <div class="section-title">Contractor rollup <span class="section-sub">${contractors.length} contractor${contractors.length === 1 ? '' : 's'}</span></div>
      <table class="ops-table">
        <thead><tr><th>Contractor</th><th style="text-align:right;">Operations</th><th style="text-align:right;">Total production</th><th style="text-align:right;">Total cost</th><th style="text-align:right;">Weighted $/bcm</th><th>Share</th></tr></thead>
        <tbody>
          ${contractors.map(c => {
            const sharePct = STATE.sessions.length > 0 ? (c.bcm / contractors.reduce((s, x) => s + x.bcm, 0)) * 100 : 0;
            return `<tr>
              <td class="label-cell"><strong>${c.name}</strong></td>
              <td style="text-align:right;">${c.ops}</td>
              <td style="text-align:right;">${fmt(c.bcm, 0)} bcm</td>
              <td style="text-align:right;" class="cost">${fmtMoney(c.cost, 0)}</td>
              <td style="text-align:right;" class="cost">${fmtMoney(c.unit_cost, 2)}</td>
              <td><span class="match-bar"><span class="match-fill ok" style="width:${sharePct}%"></span></span> ${sharePct.toFixed(0)}%</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
      <div class="help-block" style="margin-top:10px;color:var(--text2);">Contractor field is inferred from cost_code prefix (e.g. "SEM-..." → "SEM Civil") or defaults to "SEM Civil" when absent. Production Supe v1.6 will add an explicit contractor field for multi-contractor sites.</div>
    </div>
  `;
}

// Daily aggregates (used by drawTrendsCharts)
function _trendsDaily() {
  const dates = [...new Set(STATE.sessions.map(s => s.date).filter(Boolean))].sort();
  return dates.map(d => {
    const ds = STATE.sessions.filter(s => s.date === d);
    let bcm = 0, cost = 0, fuel_L = 0;
    let bc = { balanced: 0, dig: 0, truck: 0, dump: 0 };
    ds.forEach(s => {
      bcm += s.production_bcm || 0;
      cost += s.total_cost || 0;
      fuel_L += s.fuel_L || 0;
      if (s.bottleneck && bc[s.bottleneck] !== undefined) bc[s.bottleneck]++;
    });
    let a_bcm = 0, a_cost = 0, matched = 0;
    if (STATE.actuals.length > 0) {
      ds.forEach(s => {
        const a = findActualFor(s);
        if (a) { matched++; a_bcm += a.actual_bcm || 0; a_cost += a.actual_cost || 0; }
      });
    }
    return { date: d, bcm, cost, fuel_L, unit_cost: bcm > 0 ? cost / bcm : 0, bc, a_bcm, a_cost, matched, a_unit: a_bcm > 0 ? a_cost / a_bcm : 0 };
  });
}

function extractContractorFromCode(code) {
  if (!code) return null;
  // Common patterns: "SEM-...", "[SEM]...", "SEM Civil..."
  const m = code.match(/^([A-Z]{2,5})[\s\-_:\[\]]/);
  if (m) {
    const map = { SEM: "SEM Civil", BRW: "BRW", WW: "W Wall and Sons", QUA: "Quarrico", PEN: "Pentacon", KH: "Kent Hire", MOR: "Morevale", NMS: "NMS", SP: "Spencer Mining", UNY: "Unyte", SEE: "SEE Civil" };
    return map[m[1]] || m[1];
  }
  return null;
}

// Chart.js styling constants matching design language
const CHART_COLORS = {
  copper: '#c8833a', copperLight: '#e8a855', ochre: '#d4a843',
  blue: '#3a6a9a', green: '#4a8a52', red: '#c0402a',
  text0: '#f0ede6', text1: '#b8b4a8', text2: '#6e6b60',
  bg2: '#1c1d18', bg3: '#252620', border: '#2e3028'
};

let _trendCharts = {};
function drawTrendsCharts() {
  if (typeof Chart === 'undefined') return;
  // Destroy any prior charts
  Object.values(_trendCharts).forEach(c => { try { c.destroy(); } catch (e) {} });
  _trendCharts = {};
  const daily = _trendsDaily();
  if (daily.length === 0) return;
  const labels = daily.map(d => d.date);

  // Common Chart.js options
  const baseOpts = {
    responsive: true, maintainAspectRatio: false,
    plugins: {
      legend: { labels: { color: CHART_COLORS.text1, font: { family: 'Barlow Condensed', size: 11 } } }
    },
    scales: {
      x: { ticks: { color: CHART_COLORS.text2, font: { family: 'DM Mono', size: 10 } }, grid: { color: CHART_COLORS.border } },
      y: { ticks: { color: CHART_COLORS.text2, font: { family: 'DM Mono', size: 10 } }, grid: { color: CHART_COLORS.border } }
    }
  };

  // 1) Unit cost over time
  const ctxCost = document.getElementById('chart-cost')?.getContext('2d');
  if (ctxCost) {
    const datasets = [{ label: 'Planned $/bcm', data: daily.map(d => d.unit_cost.toFixed(2)), borderColor: CHART_COLORS.copperLight, backgroundColor: 'rgba(232, 168, 85, 0.1)', tension: 0.2, pointRadius: 4 }];
    if (daily.some(d => d.a_unit > 0)) {
      datasets.push({ label: 'Actual $/bcm', data: daily.map(d => d.a_unit > 0 ? d.a_unit.toFixed(2) : null), borderColor: CHART_COLORS.green, backgroundColor: 'rgba(74, 138, 82, 0.1)', tension: 0.2, pointRadius: 4 });
    }
    _trendCharts.cost = new Chart(ctxCost, { type: 'line', data: { labels, datasets }, options: baseOpts });
  }

  // 2) Production over time
  const ctxBcm = document.getElementById('chart-bcm')?.getContext('2d');
  if (ctxBcm) {
    const datasets = [{ label: 'Planned bcm', data: daily.map(d => d.bcm), backgroundColor: CHART_COLORS.copperLight, borderRadius: 2 }];
    if (daily.some(d => d.a_bcm > 0)) {
      datasets.push({ label: 'Actual bcm', data: daily.map(d => d.a_bcm), backgroundColor: CHART_COLORS.green, borderRadius: 2 });
    }
    _trendCharts.bcm = new Chart(ctxBcm, { type: 'bar', data: { labels, datasets }, options: baseOpts });
  }

  // 3) Bottleneck distribution stacked
  const ctxBn = document.getElementById('chart-bottleneck')?.getContext('2d');
  if (ctxBn) {
    _trendCharts.bn = new Chart(ctxBn, {
      type: 'bar',
      data: {
        labels,
        datasets: [
          { label: 'Balanced', data: daily.map(d => d.bc.balanced), backgroundColor: CHART_COLORS.green },
          { label: 'Dig-constrained', data: daily.map(d => d.bc.dig), backgroundColor: CHART_COLORS.ochre },
          { label: 'Truck-constrained', data: daily.map(d => d.bc.truck), backgroundColor: CHART_COLORS.red },
          { label: 'Dump-constrained', data: daily.map(d => d.bc.dump), backgroundColor: CHART_COLORS.copper }
        ]
      },
      options: { ...baseOpts, scales: { x: { ...baseOpts.scales.x, stacked: true }, y: { ...baseOpts.scales.y, stacked: true } } }
    });
  }

  // 4) Diesel burn over time
  const ctxFuel = document.getElementById('chart-fuel')?.getContext('2d');
  if (ctxFuel) {
    _trendCharts.fuel = new Chart(ctxFuel, {
      type: 'line',
      data: { labels, datasets: [{ label: 'Diesel L/shift', data: daily.map(d => d.fuel_L), borderColor: CHART_COLORS.ochre, backgroundColor: 'rgba(212, 168, 67, 0.1)', tension: 0.2, pointRadius: 4 }] },
      options: baseOpts
    });
  }
}

// v0.3 — HELP report export: markdown and print
function _stripHtml(html) { return (html || '').replace(/<[^>]*>/g, ''); }

function exportHelpReportMD(help) {
  const dateRange = (() => {
    const dates = [...new Set(STATE.sessions.map(s => s.date).filter(Boolean))].sort();
    return dates.length === 0 ? 'no dates' : (dates.length === 1 ? dates[0] : `${dates[0]} → ${dates[dates.length - 1]}`);
  })();
  const md = `# Pit Boss HELP Report

**Period:** ${dateRange}
**Sessions:** ${help.n_sessions}${help.n_actuals > 0 ? ` · ${help.n_actuals} actuals reconciled` : ''}
**Generated:** ${new Date().toISOString().slice(0, 10)}

---

## Highlights

${help.H.length > 0 ? help.H.map(x => `- ${_stripHtml(x)}`).join('\n') : '_No standout positives surfaced yet._'}

## Lowlights

${help.L.length > 0 ? help.L.map(x => `- ${_stripHtml(x)}`).join('\n') : '_No material underperformance flagged._'}

## Emerging issues

${help.E.length > 0 ? help.E.map(x => `- ${_stripHtml(x)}`).join('\n') : '_No recurring patterns yet — keep capturing._'}

## Priorities

${help.P.length > 0 ? help.P.map(x => `- ${_stripHtml(x)}`).join('\n') : '_No urgent reallocation or rebalancing required._'}

## How leadership can help

${help.HELP.length > 0 ? help.HELP.map(x => `- ${_stripHtml(x)}`).join('\n') : '_No specific asks — operations self-sufficient at current scale._'}

---

*Generated by STRATUM Pit Boss v0.3 · HELP report module*
`;
  const blob = new Blob([md], { type: 'text/markdown;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `help-report-${new Date().toISOString().slice(0, 10)}.md`;
  a.click();
  URL.revokeObjectURL(url);
  toast('HELP report exported as markdown');
}
